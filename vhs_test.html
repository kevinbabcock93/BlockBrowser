<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VHS Box Test</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#111;overflow:hidden;width:100vw;height:100vh;touch-action:none;}
  canvas{display:block;}
  #info{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    color:rgba(255,255,255,0.5);font-family:monospace;font-size:12px;
    text-align:center;pointer-events:none;}
  #title{position:fixed;top:20px;left:50%;transform:translateX(-50%);
    color:#FFD700;font-family:Arial Black,Arial;font-size:14px;letter-spacing:2px;
    text-align:center;pointer-events:none;}
</style>
</head>
<body>
<div id="title">DRAG TO ROTATE</div>
<div id="info">Loading...</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.183.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.183.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

// ── Renderer ──────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d0d);

// ── Camera ────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(38, window.innerWidth/window.innerHeight, 0.001, 100);
camera.position.set(0, 0, 0.55);

// ── Environment map for reflections ──────────────────────────
// Use a simple procedural env map since we can't load HDRI from unpkg easily
const pmremGenerator = new THREE.PMREMGenerator(renderer);
pmremGenerator.compileEquirectangularShader();

// Build a simple studio env map
const envScene = new THREE.Scene();
// Bright top light
const envTop = new THREE.DirectionalLight(0xffffff, 3);
envTop.position.set(0,1,0); envScene.add(envTop);
const envFill = new THREE.HemisphereLight(0x8888ff, 0x442200, 1.5);
envScene.add(envFill);

// ── Lighting ──────────────────────────────────────────────────
// Key light — warm, from upper left
const keyLight = new THREE.DirectionalLight(0xfff5e8, 3.5);
keyLight.position.set(-1.5, 2.5, 2);
keyLight.castShadow = true;
scene.add(keyLight);

// Fill light — cool, from right
const fillLight = new THREE.DirectionalLight(0xe8f0ff, 1.0);
fillLight.position.set(2, 0.5, 1);
scene.add(fillLight);

// Rim light — from behind, white
const rimLight = new THREE.DirectionalLight(0xffffff, 1.8);
rimLight.position.set(0.3, 1, -2);
scene.add(rimLight);

// Ambient
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

// ── VHS Box geometry ─────────────────────────────────────────
// Real VHS dimensions: 188mm tall × 104mm wide × 28mm deep
// Scale: 1 unit = 1 metre
const W = 0.104;  // width  (X) — this is what you see face-on
const H = 0.188;  // height (Y)
const D = 0.028;  // depth  (Z) — the spine when spine-out on shelf

// We display the box face-on (poster facing camera)
// so the wide face (W×H) faces the camera

// ── Textures ──────────────────────────────────────────────────
const loader = new THREE.TextureLoader();

// TMDB movie — using a real poster
const TMDB_KEY = '03549aee0d249c4c994eaf6f2f579cf2';
const MOVIE_ID = 27205; // Inception — change to test different movies

let movie = {
  title: 'INCEPTION',
  year: '2010',
  rating: '8.4',
  genre: 'SCI-FI',
  desc: 'A thief who steals corporate secrets through the use of dream-sharing technology is given the inverse task of planting an idea into the mind of a C.E.O.',
  posterUrl: null,
};

// Fetch movie data + credits + images
const MOVIE_ID = 27205; // Inception
fetch(`https://api.themoviedb.org/3/movie/${MOVIE_ID}?api_key=${TMDB_KEY}&append_to_response=credits,images`)
  .then(r=>r.json())
  .then(async d=>{
    movie.title    = d.title || movie.title;
    movie.year     = (d.release_date||'').slice(0,4) || movie.year;
    movie.rating   = d.vote_average?.toFixed(1) || movie.rating;
    movie.runtime  = d.runtime ? `${d.runtime} MIN` : '';
    movie.desc     = d.overview?.slice(0,280) || movie.desc;
    movie.genre    = d.genres?.[0]?.name?.toUpperCase() || movie.genre;
    movie.director = d.credits?.crew?.find(c=>c.job==='Director')?.name || '';
    movie.cast     = d.credits?.cast?.slice(0,4).map(c=>c.name).join(', ') || '';

    document.getElementById('title').textContent = movie.title;

    // Load poster
    if(d.poster_path){
      movie.posterUrl = `https://image.tmdb.org/t/p/w500${d.poster_path}`;
      updatePosterMaterial(movie.posterUrl);
    }

    // Load up to 3 backdrop images for back cover
    const backdrops = (d.images?.backdrops||[]).slice(0,3);
    const backdropImgs = await Promise.all(backdrops.map(b=>
      new Promise(res=>{
        const img=new Image(); img.crossOrigin='anonymous';
        img.onload=()=>res(img);
        img.onerror=()=>res(null);
        img.src=`https://image.tmdb.org/t/p/w300${b.file_path}`;
      })
    ));
    const loadedImgs = backdropImgs.filter(Boolean);

    // Build back and spine with real data
    backMat.map = makeBackCanvas(loadedImgs);
    backMat.needsUpdate = true;
    spineMat.map = makeSpineCanvas();
    spineMat.needsUpdate = true;
  })
  .catch(e=>console.warn('TMDB fetch failed',e));

// ── Canvas textures ───────────────────────────────────────────

function makeSpineCanvas() {
  const c = document.createElement('canvas'); c.width=64; c.height=512;
  const x = c.getContext('2d');

  // Full white plastic case
  x.fillStyle = '#e8e2d8'; x.fillRect(0,0,64,512);

  // Thin label — goes almost edge to edge, just 2px border
  x.fillStyle = '#0a0a14'; x.fillRect(2, 2, 60, 508);

  // Very subtle gradient on label
  const g = x.createLinearGradient(0,0,64,0);
  g.addColorStop(0,'rgba(255,255,255,0.08)');
  g.addColorStop(0.5,'rgba(255,255,255,0.01)');
  g.addColorStop(1,'rgba(0,0,0,0.12)');
  x.fillStyle=g; x.fillRect(2,2,60,508);

  // Title — rotated, white text, tight to label
  x.save();
  x.translate(32, 256);
  x.rotate(-Math.PI/2);
  x.fillStyle = '#ffffff';
  x.font = 'bold 15px Arial Narrow, Arial';
  x.textAlign = 'center';
  x.textBaseline = 'middle';
  x.letterSpacing = '2px';
  x.fillText(movie.title.toUpperCase(), 0, 0);
  x.restore();

  // Small studio placeholder at bottom
  x.save();
  x.translate(32, 478);
  x.rotate(-Math.PI/2);
  x.fillStyle='rgba(255,255,255,0.3)';
  x.font='8px Arial';
  x.textAlign='center'; x.textBaseline='middle';
  x.fillText(movie.year, 0, 0);
  x.restore();

  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}

// Back cover — built async once backdrop images load
function makeBackCanvas(backdrops=[]) {
  const cw=512, ch=768;
  const c=document.createElement('canvas'); c.width=cw; c.height=ch;
  const x=c.getContext('2d');

  // Background — dark navy, like real VHS back
  x.fillStyle='#080810'; x.fillRect(0,0,cw,ch);

  let yOffset = 0;

  // ── Screenshot images grid ──────────────────────────────
  // Arrange up to 3 backdrop images across the top 40% of back
  const imgH = Math.round(ch * 0.38);
  if(backdrops.length >= 3){
    // 3 images side by side
    const iw = Math.floor(cw/3)-2;
    for(let i=0;i<3;i++){
      try{ x.drawImage(backdrops[i], i*(iw+2), 0, iw, imgH); }catch(_){}
    }
    // Thin separator line
    x.fillStyle='rgba(255,255,255,0.15)'; x.fillRect(0,imgH,cw,1);
    yOffset = imgH + 8;
  } else if(backdrops.length === 2){
    const iw = Math.floor(cw/2)-1;
    for(let i=0;i<2;i++){
      try{ x.drawImage(backdrops[i], i*(iw+1), 0, iw, imgH); }catch(_){}
    }
    x.fillStyle='rgba(255,255,255,0.15)'; x.fillRect(0,imgH,cw,1);
    yOffset = imgH + 8;
  } else if(backdrops.length === 1){
    try{ x.drawImage(backdrops[0], 0, 0, cw, imgH); }catch(_){}
    x.fillStyle='rgba(255,255,255,0.15)'; x.fillRect(0,imgH,cw,1);
    yOffset = imgH + 8;
  } else {
    // No images — colored header band instead
    x.fillStyle='#1a1a3a'; x.fillRect(0,0,cw,60);
    yOffset = 68;
  }

  // ── Title ────────────────────────────────────────────────
  x.fillStyle='#ffffff';
  x.font='bold 28px Arial Black, Arial';
  x.textAlign='left'; x.textBaseline='top';
  x.fillText(movie.title.toUpperCase(), 16, yOffset);
  yOffset += 36;

  // Year · Rating · Runtime row
  x.fillStyle='rgba(255,255,255,0.55)';
  x.font='12px Arial';
  x.fillText(`${movie.year}  ·  ★ ${movie.rating}  ·  ${movie.runtime||''}`, 16, yOffset);
  yOffset += 22;

  // Thin rule
  x.fillStyle='rgba(255,255,255,0.15)'; x.fillRect(16,yOffset,cw-32,1);
  yOffset += 10;

  // ── Synopsis ─────────────────────────────────────────────
  x.fillStyle='rgba(255,255,255,0.82)';
  x.font='13px Arial';
  const words = movie.desc.split(' ');
  let line='', lineH=19;
  for(const w of words){
    const test=line+w+' ';
    if(x.measureText(test).width > cw-32 && line!==''){
      x.fillText(line.trim(), 16, yOffset);
      line=w+' '; yOffset+=lineH;
      if(yOffset > ch-140) break;
    } else { line=test; }
  }
  if(line.trim() && yOffset <= ch-140){ x.fillText(line.trim(),16,yOffset); yOffset+=lineH; }
  yOffset += 10;

  // ── Cast line ────────────────────────────────────────────
  if(movie.cast){
    x.fillStyle='rgba(255,255,255,0.4)';
    x.font='11px Arial';
    x.fillText(`CAST: ${movie.cast}`, 16, yOffset);
    yOffset += 18;
  }

  // ── Director line ────────────────────────────────────────
  if(movie.director){
    x.fillStyle='rgba(255,255,255,0.4)';
    x.font='11px Arial';
    x.fillText(`DIRECTED BY ${movie.director.toUpperCase()}`, 16, yOffset);
    yOffset += 18;
  }

  // ── Bottom section ───────────────────────────────────────
  // Rating badge
  x.fillStyle='rgba(255,255,255,0.08)';
  x.fillRect(0, ch-90, cw, 90);
  x.fillStyle='rgba(255,255,255,0.15)';
  x.fillRect(0, ch-90, cw, 1);

  // Studio / disclaimer text
  x.fillStyle='rgba(255,255,255,0.25)';
  x.font='9px Arial';
  x.textAlign='left';
  x.fillText('© Warner Bros. Entertainment Inc. All Rights Reserved.', 16, ch-72);
  x.fillText('Manufactured and distributed under license.', 16, ch-60);
  x.fillText(`NOT FOR SALE OR RENTAL  ·  ${movie.year}`, 16, ch-48);

  // Barcode
  x.fillStyle='#ffffff'; x.fillRect(cw-120, ch-76, 104, 46);
  x.fillStyle='#000000';
  for(let i=0;i<36;i++){
    const bw = Math.random()>0.6?3:Math.random()>0.4?2:1;
    x.fillRect(cw-118+i*2.7, ch-74, bw, 38);
  }
  x.fillStyle='#000'; x.font='8px Arial'; x.textAlign='center';
  x.fillText('5 01234 56789 0', cw-68, ch-36);

  // Rating box
  x.fillStyle='#ffffff'; x.fillRect(14, ch-76, 46, 46);
  x.fillStyle='#000'; x.font='bold 13px Arial Black'; x.textAlign='center';
  x.fillText('PG-13', 37, ch-58);
  x.fillStyle='#555'; x.font='8px Arial';
  x.fillText('RATED', 37, ch-46);

  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}

function makeTopCanvas() {
  const c=document.createElement('canvas'); c.width=256; c.height=64;
  const x=c.getContext('2d');
  // Off-white plastic top
  const g=x.createLinearGradient(0,0,0,64);
  g.addColorStop(0,'#e8e0d4');g.addColorStop(1,'#ccc5b8');
  x.fillStyle=g; x.fillRect(0,0,256,64);
  // Subtle reel window indentation line
  x.strokeStyle='rgba(0,0,0,0.15)'; x.lineWidth=1;
  x.strokeRect(30,8,196,48);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}

// ── Materials ─────────────────────────────────────────────────
// Plastic case material — shared for side/bottom
const plasticMat = new THREE.MeshStandardMaterial({
  color: 0xddd5c8,
  roughness: 0.25,
  metalness: 0.0,
});

// Poster face — placeholder until loaded
const posterMat = new THREE.MeshStandardMaterial({
  color: 0x223344,
  roughness: 0.15,
  metalness: 0.0,
});

// Spine material
const spineMat = new THREE.MeshStandardMaterial({
  map: makeSpineCanvas(),
  roughness: 0.2,
  metalness: 0.0,
});

// Back material
const backMat = new THREE.MeshStandardMaterial({
  map: makeBackCanvas(),
  roughness: 0.25,
  metalness: 0.0,
});

// Top material
const topMat = new THREE.MeshStandardMaterial({
  map: makeTopCanvas(),
  roughness: 0.2,
  metalness: 0.02,
});

// Bottom
const botMat = new THREE.MeshStandardMaterial({
  color: 0xb8b0a4,
  roughness: 0.4,
  metalness: 0.0,
});

// BoxGeometry face order: +x, -x, +y, -y, +z, -z
// We orient box so:
//   +z face = FRONT (poster, faces camera)
//   -z face = BACK
//   +x face = RIGHT edge (thin, D wide)
//   -x face = LEFT edge / spine (thin, D wide)  ← spine visible when on shelf
//   +y = TOP
//   -y = BOTTOM
const geo = new THREE.BoxGeometry(W, H, D);
const materials = [
  plasticMat,   // +x right edge
  spineMat,     // -x LEFT = SPINE (faces player when box is on shelf spine-out)
  topMat,       // +y top
  botMat,       // -y bottom
  posterMat,    // +z FRONT = poster face
  backMat,      // -z back
];

const box = new THREE.Mesh(geo, materials);
box.castShadow = true;
box.receiveShadow = true;
scene.add(box);

// ── Subtle ground plane for shadow ───────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(2,2),
  new THREE.MeshStandardMaterial({color:0x111111, roughness:1})
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.15;
ground.receiveShadow = true;
scene.add(ground);

// ── Load real poster ──────────────────────────────────────────
function updatePosterMaterial(url) {
  loader.load(url, tex => {
    tex.colorSpace = THREE.SRGBColorSpace;
    posterMat.map = tex;
    posterMat.color.set(0xffffff);
    posterMat.roughness = 0.12;
    posterMat.needsUpdate = true;
  });
}

// ── Rotation state ────────────────────────────────────────────
let rotX = 0.15, rotY = 0.4;
let isDragging = false;
let lastX = 0, lastY = 0;
let velX = 0, velY = 0;
let autoRotate = true;
let autoTimer = null;

// Initial orientation — show poster face (rotY=0 means +z faces camera = poster)
box.rotation.set(rotX, rotY, 0);

// Mouse
renderer.domElement.addEventListener('mousedown', e=>{
  isDragging=true; autoRotate=false;
  lastX=e.clientX; lastY=e.clientY; velX=0; velY=0;
});
window.addEventListener('mouseup', ()=>{
  isDragging=false;
  clearTimeout(autoTimer);
  autoTimer=setTimeout(()=>autoRotate=true, 3000);
});
window.addEventListener('mousemove', e=>{
  if(!isDragging)return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  velX=dx*0.008; velY=dy*0.008;
  rotY+=velX; rotX+=velY;
  lastX=e.clientX; lastY=e.clientY;
});

// Touch
renderer.domElement.addEventListener('touchstart', e=>{
  isDragging=true; autoRotate=false;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  velX=0; velY=0; e.preventDefault();
},{passive:false});
window.addEventListener('touchend', ()=>{
  isDragging=false;
  clearTimeout(autoTimer);
  autoTimer=setTimeout(()=>autoRotate=true, 3000);
});
window.addEventListener('touchmove', e=>{
  if(!isDragging)return;
  const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
  velX=dx*0.01; velY=dy*0.01;
  rotY+=velX; rotX+=velY;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  e.preventDefault();
},{passive:false});

// ── Animation loop ────────────────────────────────────────────
const infoEl = document.getElementById('info');

function animate(){
  requestAnimationFrame(animate);
  if(autoRotate){
    rotY += 0.004;
    velX *= 0.95; velY *= 0.95;
  } else if(!isDragging){
    rotY += velX; rotX += velY;
    velX *= 0.90; velY *= 0.90;
  }
  // Clamp vertical rotation
  rotX = Math.max(-Math.PI*0.45, Math.min(Math.PI*0.45, rotX));
  box.rotation.set(rotX, rotY, 0);
  renderer.render(scene, camera);
  infoEl.textContent = 'DRAG TO ROTATE · RELEASE TO AUTO-SPIN';
}
animate();

// ── Resize ────────────────────────────────────────────────────
window.addEventListener('resize', ()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
