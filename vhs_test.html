<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VHS Box Test</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#111;overflow:hidden;width:100vw;height:100vh;touch-action:none;}
  canvas{display:block;}
  #info{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    color:rgba(255,255,255,0.5);font-family:monospace;font-size:12px;
    text-align:center;pointer-events:none;}
  #title{position:fixed;top:20px;left:50%;transform:translateX(-50%);
    color:#FFD700;font-family:Arial Black,Arial;font-size:14px;letter-spacing:2px;
    text-align:center;pointer-events:none;}
</style>
</head>
<body>
<div id="title">DRAG TO ROTATE</div>
<div id="info">Loading...</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.183.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.183.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

// ── Renderer ──────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d0d);

// ── Camera ────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(38, window.innerWidth/window.innerHeight, 0.001, 100);
camera.position.set(0, 0, 0.55);

// ── Environment map for reflections ──────────────────────────
// Use a simple procedural env map since we can't load HDRI from unpkg easily
const pmremGenerator = new THREE.PMREMGenerator(renderer);
pmremGenerator.compileEquirectangularShader();

// Build a simple studio env map
const envScene = new THREE.Scene();
// Bright top light
const envTop = new THREE.DirectionalLight(0xffffff, 3);
envTop.position.set(0,1,0); envScene.add(envTop);
const envFill = new THREE.HemisphereLight(0x8888ff, 0x442200, 1.5);
envScene.add(envFill);

// ── Lighting ──────────────────────────────────────────────────
// Key light — warm, from upper left
const keyLight = new THREE.DirectionalLight(0xfff5e8, 3.5);
keyLight.position.set(-1.5, 2.5, 2);
keyLight.castShadow = true;
scene.add(keyLight);

// Fill light — cool, from right
const fillLight = new THREE.DirectionalLight(0xe8f0ff, 1.0);
fillLight.position.set(2, 0.5, 1);
scene.add(fillLight);

// Rim light — from behind, white
const rimLight = new THREE.DirectionalLight(0xffffff, 1.8);
rimLight.position.set(0.3, 1, -2);
scene.add(rimLight);

// Ambient
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

// ── VHS Box geometry ─────────────────────────────────────────
// Real VHS dimensions: 188mm tall × 104mm wide × 28mm deep
// Scale: 1 unit = 1 metre
const W = 0.104;  // width  (X) — this is what you see face-on
const H = 0.188;  // height (Y)
const D = 0.028;  // depth  (Z) — the spine when spine-out on shelf

// We display the box face-on (poster facing camera)
// so the wide face (W×H) faces the camera

// ── Textures ──────────────────────────────────────────────────
const loader = new THREE.TextureLoader();

// TMDB movie — using a real poster
const TMDB_KEY = '03549aee0d249c4c994eaf6f2f579cf2';
const INFO_URL = `https://api.themoviedb.org/3/movie/27205?api_key=${TMDB_KEY}`; // Inception

let movie = {
  title: 'INCEPTION',
  year: '2010',
  rating: '8.4',
  genre: 'SCI-FI',
  desc: 'A thief who steals corporate secrets through the use of dream-sharing technology is given the inverse task of planting an idea into the mind of a C.E.O.',
  posterUrl: null,
};

// Fetch movie data
fetch(INFO_URL)
  .then(r=>r.json())
  .then(d=>{
    movie.title = d.title || movie.title;
    movie.year = (d.release_date||'').slice(0,4) || movie.year;
    movie.rating = d.vote_average?.toFixed(1) || movie.rating;
    movie.desc = d.overview?.slice(0,180) || movie.desc;
    if(d.poster_path){
      movie.posterUrl = `https://image.tmdb.org/t/p/w500${d.poster_path}`;
      updatePosterMaterial(movie.posterUrl);
    }
    document.getElementById('title').textContent = movie.title;
    updateBackMaterial();
  })
  .catch(()=>{});

// ── Canvas textures ───────────────────────────────────────────

function makeSpineCanvas() {
  const c = document.createElement('canvas'); c.width=128; c.height=512;
  const x = c.getContext('2d');
  // Off-white plastic base
  x.fillStyle = '#ddd5c8'; x.fillRect(0,0,128,512);
  // Dark label strip
  x.fillStyle = '#111122';
  x.fillRect(12, 30, 104, 452);
  // Subtle gradient on label
  const g = x.createLinearGradient(12,0,116,0);
  g.addColorStop(0, 'rgba(255,255,255,0.12)');
  g.addColorStop(0.4, 'rgba(255,255,255,0.03)');
  g.addColorStop(1, 'rgba(0,0,0,0.15)');
  x.fillStyle=g; x.fillRect(12,30,104,452);
  // Title rotated
  x.save();
  x.translate(64, 256);
  x.rotate(-Math.PI/2);
  x.fillStyle = '#FFD700';
  x.font = 'bold 28px Arial Black, Arial';
  x.textAlign='center'; x.textBaseline='middle';
  x.shadowColor='rgba(0,0,0,0.8)'; x.shadowBlur=4;
  x.fillText(movie.title, 0, 0);
  x.restore();
  // Year at bottom of spine
  x.save();
  x.translate(64, 460);
  x.rotate(-Math.PI/2);
  x.fillStyle='rgba(255,255,255,0.5)';
  x.font='14px Arial'; x.textAlign='center'; x.textBaseline='middle';
  x.fillText(movie.year||'', 0, 0);
  x.restore();
  // Plastic edge highlights
  x.fillStyle='rgba(255,255,255,0.5)'; x.fillRect(0,0,10,512);
  x.fillStyle='rgba(0,0,0,0.3)'; x.fillRect(118,0,10,512);
  // Top/bottom plastic caps
  x.fillStyle='#ccc5b8'; x.fillRect(0,0,128,28);
  x.fillStyle='#ccc5b8'; x.fillRect(0,484,128,28);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}

function makeBackCanvas() {
  const c=document.createElement('canvas'); c.width=512; c.height=768;
  const x=c.getContext('2d');
  // Dark background
  x.fillStyle='#0e0e1a'; x.fillRect(0,0,512,768);
  // Genre color strip at top
  x.fillStyle='#1a1a3a'; x.fillRect(0,0,512,60);
  x.fillStyle='rgba(255,215,0,0.9)';
  x.font='bold 20px Arial Black'; x.textAlign='left'; x.textBaseline='middle';
  x.fillText(movie.genre, 20, 30);
  // Rating badge
  x.fillStyle='#FFD700'; x.fillRect(430,12,68,36);
  x.fillStyle='#111'; x.font='bold 18px Arial Black'; x.textAlign='center';
  x.fillText(`★ ${movie.rating}`, 464, 30);
  // Title
  x.fillStyle='#ffffff'; x.font='bold 32px Arial Black'; x.textAlign='left';
  const titleWords = movie.title.split(' ');
  let tline='', ty=100;
  titleWords.forEach(w=>{
    if(x.measureText(tline+w).width>460){x.fillText(tline.trim(),24,ty);tline='';ty+=40;}
    tline+=w+' ';
  });
  if(tline.trim()) x.fillText(tline.trim(),24,ty); ty+=50;
  // Synopsis
  x.fillStyle='rgba(255,255,255,0.75)'; x.font='16px Arial';
  const words=movie.desc.split(' ');
  let line2='',sy=ty;
  words.forEach(w=>{
    if(x.measureText(line2+w).width>460){x.fillText(line2.trim(),24,sy);line2='';sy+=24;}
    line2+=w+' ';
  });
  if(line2.trim()) x.fillText(line2.trim(),24,sy);
  // Barcode
  x.fillStyle='#fff'; x.fillRect(160,690,192,50);
  x.fillStyle='#000';
  for(let i=0;i<60;i++){
    if(Math.random()>0.4){x.fillRect(162+i*3,692,Math.random()>0.5?1:2,46);}
  }
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}

function makeTopCanvas() {
  const c=document.createElement('canvas'); c.width=256; c.height=64;
  const x=c.getContext('2d');
  // Off-white plastic top
  const g=x.createLinearGradient(0,0,0,64);
  g.addColorStop(0,'#e8e0d4');g.addColorStop(1,'#ccc5b8');
  x.fillStyle=g; x.fillRect(0,0,256,64);
  // Subtle reel window indentation line
  x.strokeStyle='rgba(0,0,0,0.15)'; x.lineWidth=1;
  x.strokeRect(30,8,196,48);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}

// ── Materials ─────────────────────────────────────────────────
// Plastic case material — shared for side/bottom
const plasticMat = new THREE.MeshStandardMaterial({
  color: 0xddd5c8,
  roughness: 0.25,
  metalness: 0.0,
});

// Poster face — placeholder until loaded
const posterMat = new THREE.MeshStandardMaterial({
  color: 0x223344,
  roughness: 0.15,
  metalness: 0.0,
});

// Spine material
const spineMat = new THREE.MeshStandardMaterial({
  map: makeSpineCanvas(),
  roughness: 0.2,
  metalness: 0.0,
});

// Back material
const backMat = new THREE.MeshStandardMaterial({
  map: makeBackCanvas(),
  roughness: 0.25,
  metalness: 0.0,
});

// Top material
const topMat = new THREE.MeshStandardMaterial({
  map: makeTopCanvas(),
  roughness: 0.2,
  metalness: 0.02,
});

// Bottom
const botMat = new THREE.MeshStandardMaterial({
  color: 0xb8b0a4,
  roughness: 0.4,
  metalness: 0.0,
});

// BoxGeometry face order: +x, -x, +y, -y, +z, -z
// We orient box so:
//   +z face = FRONT (poster, faces camera)
//   -z face = BACK
//   +x face = RIGHT edge (thin, D wide)
//   -x face = LEFT edge / spine (thin, D wide)  ← spine visible when on shelf
//   +y = TOP
//   -y = BOTTOM
const geo = new THREE.BoxGeometry(W, H, D);
const materials = [
  plasticMat,   // +x right edge
  spineMat,     // -x LEFT = SPINE (faces player when box is on shelf spine-out)
  topMat,       // +y top
  botMat,       // -y bottom
  posterMat,    // +z FRONT = poster face
  backMat,      // -z back
];

const box = new THREE.Mesh(geo, materials);
box.castShadow = true;
box.receiveShadow = true;
scene.add(box);

// ── Subtle ground plane for shadow ───────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(2,2),
  new THREE.MeshStandardMaterial({color:0x111111, roughness:1})
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.15;
ground.receiveShadow = true;
scene.add(ground);

// ── Load real poster ──────────────────────────────────────────
function updatePosterMaterial(url) {
  loader.load(url, tex => {
    tex.colorSpace = THREE.SRGBColorSpace;
    posterMat.map = tex;
    posterMat.color.set(0xffffff);
    posterMat.roughness = 0.12;
    posterMat.needsUpdate = true;
  });
}

function updateBackMaterial() {
  backMat.map = makeBackCanvas();
  backMat.needsUpdate = true;
  spineMat.map = makeSpineCanvas();
  spineMat.needsUpdate = true;
}

// ── Rotation state ────────────────────────────────────────────
let rotX = 0.15, rotY = 0.4;
let isDragging = false;
let lastX = 0, lastY = 0;
let velX = 0, velY = 0;
let autoRotate = true;
let autoTimer = null;

// Initial orientation — show poster face (rotY=0 means +z faces camera = poster)
box.rotation.set(rotX, rotY, 0);

// Mouse
renderer.domElement.addEventListener('mousedown', e=>{
  isDragging=true; autoRotate=false;
  lastX=e.clientX; lastY=e.clientY; velX=0; velY=0;
});
window.addEventListener('mouseup', ()=>{
  isDragging=false;
  clearTimeout(autoTimer);
  autoTimer=setTimeout(()=>autoRotate=true, 3000);
});
window.addEventListener('mousemove', e=>{
  if(!isDragging)return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  velX=dx*0.008; velY=dy*0.008;
  rotY+=velX; rotX+=velY;
  lastX=e.clientX; lastY=e.clientY;
});

// Touch
renderer.domElement.addEventListener('touchstart', e=>{
  isDragging=true; autoRotate=false;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  velX=0; velY=0; e.preventDefault();
},{passive:false});
window.addEventListener('touchend', ()=>{
  isDragging=false;
  clearTimeout(autoTimer);
  autoTimer=setTimeout(()=>autoRotate=true, 3000);
});
window.addEventListener('touchmove', e=>{
  if(!isDragging)return;
  const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
  velX=dx*0.01; velY=dy*0.01;
  rotY+=velX; rotX+=velY;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  e.preventDefault();
},{passive:false});

// ── Animation loop ────────────────────────────────────────────
const infoEl = document.getElementById('info');

function animate(){
  requestAnimationFrame(animate);
  if(autoRotate){
    rotY += 0.004;
    velX *= 0.95; velY *= 0.95;
  } else if(!isDragging){
    rotY += velX; rotX += velY;
    velX *= 0.90; velY *= 0.90;
  }
  // Clamp vertical rotation
  rotX = Math.max(-Math.PI*0.45, Math.min(Math.PI*0.45, rotX));
  box.rotation.set(rotX, rotY, 0);
  renderer.render(scene, camera);
  infoEl.textContent = 'DRAG TO ROTATE · RELEASE TO AUTO-SPIN';
}
animate();

// ── Resize ────────────────────────────────────────────────────
window.addEventListener('resize', ()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
