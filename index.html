<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BlockBrowser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=VT323&family=Barlow:wght@400;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0a;overflow:hidden;width:100vw;height:100vh;font-family:'Barlow',sans-serif;}
  #app{width:100vw;height:100vh;position:relative;}
  canvas{display:block;}

  /* ── HUD ── */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:20;}

  #store-sign{
    position:absolute;top:16px;left:50%;transform:translateX(-50%);
    background:#FFD700;color:#1a1a1a;font-family:'Bebas Neue',cursive;
    font-size:22px;letter-spacing:4px;padding:5px 22px 3px;border-radius:2px;
    box-shadow:0 0 20px rgba(255,215,0,0.6);border:3px solid #b8860b;white-space:nowrap;
  }
  #store-sign span{color:#1565C0;}

  #section-label{
    position:absolute;top:60px;left:50%;transform:translateX(-50%);
    font-family:'VT323',monospace;font-size:20px;color:#FFD700;letter-spacing:3px;
    text-shadow:0 0 8px rgba(255,215,0,0.6);opacity:0;transition:opacity 0.3s;
    background:rgba(0,0,0,0.5);padding:3px 12px;border-radius:3px;white-space:nowrap;
  }
  #section-label.show{opacity:1;}

  #crosshair{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:14px;height:14px;pointer-events:none;
  }
  #crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.75);}
  #crosshair::before{width:1.5px;height:100%;left:50%;transform:translateX(-50%);}
  #crosshair::after{height:1.5px;width:100%;top:50%;transform:translateY(-50%);}

  #hint{
    position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
    font-family:'VT323',monospace;font-size:16px;color:#FFD700;letter-spacing:2px;
    opacity:0;transition:opacity 0.2s;background:rgba(0,0,0,0.55);
    padding:4px 14px;border-radius:4px;white-space:nowrap;pointer-events:none;
  }
  #hint.show{opacity:1;}

  #controls{
    position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
    display:flex;gap:6px;
  }
  .ck{background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.15);
    border-radius:5px;padding:4px 10px;font-size:10px;color:rgba(255,255,255,0.6);
    letter-spacing:1px;white-space:nowrap;}
  .ck b{color:#FFD700;font-family:'VT323',monospace;font-size:13px;}

  /* ── VHS INSPECT OVERLAY ── */
  #inspect{
    position:fixed;inset:0;z-index:100;display:none;
    background:rgba(0,0,0,0);transition:background 0.4s;
  }
  #inspect.open{display:flex;background:rgba(0,0,0,0.7);}
  #inspect-canvas-wrap{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  }
  /* The Three.js renderer for the inspect view is placed here */
  #inspect-3d{width:100%;height:100%;cursor:grab;}
  #inspect-3d:active{cursor:grabbing;}

  /* Info panel */
  #info-panel{
    position:absolute;bottom:0;left:0;right:0;
    background:linear-gradient(0deg,rgba(0,0,0,0.95) 60%,rgba(0,0,0,0) 100%);
    padding:24px 24px 20px;
    transform:translateY(100%);transition:transform 0.4s;
    pointer-events:all;
  }
  #inspect.open #info-panel{transform:translateY(0);}
  #info-title{font-family:'Bebas Neue',cursive;font-size:26px;color:#FFD700;letter-spacing:2px;line-height:1.1;margin-bottom:2px;}
  #info-meta{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:1px;margin-bottom:8px;}
  #info-tags{display:flex;gap:6px;margin-bottom:10px;}
  .itag{font-size:9px;padding:2px 8px;border-radius:3px;letter-spacing:1px;text-transform:uppercase;font-weight:700;}
  .itag.g{color:#fff;}.itag.r{background:#FFD700;color:#111;}
  #info-desc{font-size:12px;color:rgba(255,255,255,0.75);line-height:1.55;margin-bottom:14px;max-width:500px;}
  #info-btns{display:flex;gap:8px;}
  #btn-watch{flex:1;background:#FFD700;color:#111;border:none;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;padding:10px;border-radius:4px;cursor:pointer;max-width:220px;}
  #btn-watch:hover{background:#ffe84d;}
  #btn-back{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:1px;padding:10px 18px;border-radius:4px;cursor:pointer;}
  #btn-back:hover{background:rgba(255,255,255,0.14);}
  #rotate-hint{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-top:8px;font-family:'VT323',monospace;font-size:13px;}

  /* Loading */
  #loading{position:fixed;inset:0;background:#000;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s;}
  #loading.out{opacity:0;pointer-events:none;}
  #ld-logo{font-family:'Bebas Neue',cursive;font-size:clamp(40px,10vw,68px);letter-spacing:6px;color:#FFD700;text-shadow:0 0 30px rgba(255,215,0,0.4);margin-bottom:6px;}
  #ld-logo span{color:#1565C0;}
  #ld-sub{font-family:'VT323',monospace;font-size:15px;color:rgba(255,255,255,0.4);letter-spacing:3px;margin-bottom:24px;}
  #ld-bw{width:220px;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
  #ld-br{height:100%;width:0%;background:#FFD700;border-radius:3px;transition:width 0.2s;box-shadow:0 0 8px rgba(255,215,0,0.6);}
  #ld-st{font-size:10px;color:rgba(255,255,255,0.28);margin-top:9px;letter-spacing:1px;}
  #ld-re{margin-top:16px;background:transparent;border:1px solid rgba(255,215,0,0.5);color:#FFD700;font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;padding:7px 20px;border-radius:4px;cursor:pointer;display:none;}
</style>
</head>
<body>
<div id="loading">
  <div id="ld-logo">BLOCK<span>BROWSER</span></div>
  <div id="ld-sub">STOCKING THE SHELVES...</div>
  <div id="ld-bw"><div id="ld-br"></div></div>
  <div id="ld-st">Loading Three.js...</div>
  <button id="ld-re" onclick="init()">RETRY</button>
</div>

<div id="app">
  <!-- Main shelf view -->
  <div id="shelf-view"></div>

  <div id="hud">
    <div id="store-sign">BLOCK<span>BROWSER</span></div>
    <div id="section-label"></div>
    <div id="crosshair"></div>
    <div id="hint">[ CLICK ] PICK UP</div>
    <div id="controls">
      <div class="ck"><b>W A S D</b> Move</div>
      <div class="ck"><b>Mouse</b> Look</div>
      <div class="ck"><b>Click</b> Pick Up</div>
      <div class="ck"><b>ESC</b> Put Back</div>
    </div>
  </div>

  <!-- Inspect overlay -->
  <div id="inspect">
    <div id="inspect-canvas-wrap">
      <canvas id="inspect-3d"></canvas>
    </div>
    <div id="info-panel">
      <div id="info-title">Movie Title</div>
      <div id="info-meta">Year · Rating</div>
      <div id="info-tags">
        <span class="itag g" id="info-genre">Genre</span>
        <span class="itag r" id="info-rating">★ 0.0</span>
      </div>
      <div id="info-desc">Description</div>
      <div id="info-btns">
        <button id="btn-watch" onclick="watchMovie()">▶ WATCH TONIGHT</button>
        <button id="btn-back" onclick="closeInspect()">PUT BACK</button>
      </div>
      <div id="rotate-hint">DRAG TO ROTATE · PINCH TO ZOOM</div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
window.addEventListener('error', e=>{
  const d=document.createElement('div');
  d.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);color:#f55;font-family:monospace;font-size:13px;padding:20px;border:1px solid #f55;border-radius:6px;z-index:9999;max-width:80vw;';
  d.textContent='JS ERROR: '+e.message+' (line '+e.lineno+')';
  document.body.appendChild(d);
});
window.addEventListener('unhandledrejection', e=>{
  const d=document.createElement('div');
  d.style.cssText='position:fixed;top:60%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);color:#fa0;font-family:monospace;font-size:13px;padding:20px;border:1px solid #fa0;border-radius:6px;z-index:9999;max-width:80vw;';
  d.textContent='PROMISE ERROR: '+e.reason;
  document.body.appendChild(d);
});
</script>
<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ═══════════════════════════════════════════════
// TMDB
// ═══════════════════════════════════════════════
const TMDB_KEY  = '03549aee0d249c4c994eaf6f2f579cf2';
const TMDB_BASE = 'https://api.themoviedb.org/3';
const IMG_W342  = 'https://image.tmdb.org/t/p/w342';
const IMG_W500  = 'https://image.tmdb.org/t/p/w500';

const GENRES = [
  {label:'NEW RELEASES', color:0xcc2200, lt:'now_playing', gid:null},
  {label:'ACTION',       color:0xcc4400, lt:'genre',       gid:28},
  {label:'COMEDY',       color:0x0077bb, lt:'genre',       gid:35},
  {label:'HORROR',       color:0x660099, lt:'genre',       gid:27},
  {label:'DRAMA',        color:0x006633, lt:'genre',       gid:18},
  {label:'SCI-FI',       color:0x990066, lt:'genre',       gid:878},
  {label:'THRILLER',     color:0x884400, lt:'genre',       gid:53},
  {label:'ANIMATION',    color:0x006688, lt:'genre',       gid:16},
];

const POOL = GENRES.map(()=>[]);

async function fetchGenre(g, idx) {
  const u = p => g.lt==='genre'
    ? `${TMDB_BASE}/discover/movie?api_key=${TMDB_KEY}&with_genres=${g.gid}&sort_by=popularity.desc&page=${p}`
    : g.lt==='now_playing'
    ? `${TMDB_BASE}/movie/now_playing?api_key=${TMDB_KEY}&page=${p}`
    : `${TMDB_BASE}/movie/popular?api_key=${TMDB_KEY}&page=${p}`;
  // Fetch 4 pages = up to ~80 unique movies per genre
  const responses = await Promise.all([1,2,3,4,5,6,7,8].map(p=>
    fetch(u(p)).then(r=>r.ok?r.json():null).catch(()=>null)
  ));
  const seen = new Set();
  POOL[idx] = responses.flatMap(d=>d?.results||[]).filter(m=>{
    if(seen.has(m.id))return false; seen.add(m.id); return true;
  }).map(m=>({
    id: m.id,
    title: m.title||'Unknown',
    year: (m.release_date||'').slice(0,4)||'—',
    genre: g.label,
    genreColor: `#${g.color.toString(16).padStart(6,'0')}`,
    rating: m.vote_average ? m.vote_average.toFixed(1) : '—',
    desc: m.overview ? (m.overview.slice(0,200)+(m.overview.length>200?'…':'')) : ' ',
    posterSm: m.poster_path ? (IMG_W342+m.poster_path) : null,
    posterLg: m.poster_path ? (IMG_W500+m.poster_path) : null,
    hue: (m.id*53)%360,
    genreIdx: idx,
  }));
}

// ═══════════════════════════════════════════════
// THREE.JS SETUP — MAIN SCENE (shelf walk)
// ═══════════════════════════════════════════════
const W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
document.getElementById('shelf-view').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);
scene.fog = new THREE.Fog(0x0a0a0a, 12, 28);

const camera = new THREE.PerspectiveCamera(70, W/H, 0.01, 50);
camera.position.set(0, 1.65, 4); // eye height 1.65m, near south entrance

// ── Lighting ──
const ambient = new THREE.AmbientLight(0xfff5e0, 4.0); // very bright ambient
scene.add(ambient);

// Hemisphere light for overall fill
const hemi = new THREE.HemisphereLight(0xffeedd, 0x334466, 2.0);
scene.add(hemi);

// Main overhead fluorescent lights — lower Y to be closer to shelf level
function addLight(x, y, z) {
  const light = new THREE.PointLight(0xfff8e8, 4.0, 14);
  light.position.set(x, y, z);
  scene.add(light);
  const fix = new THREE.Mesh(
    new THREE.BoxGeometry(0.6, 0.04, 0.12),
    new THREE.MeshStandardMaterial({color:0xffffff, emissive:0xfff8e8, emissiveIntensity:1})
  );
  fix.position.set(x, y+0.02, z);
  scene.add(fix);
}
// Lights along both sides of store at shelf height
for(let z=2;z>=-30;z-=3){
  addLight(-4, 2.8, z);
  addLight( 4, 2.8, z);
}

// ── Store geometry ──
// Floor — dark Blockbuster blue carpet
const floorMat = new THREE.MeshStandardMaterial({color:0x1a3a70,roughness:0.95,metalness:0});
const floor = new THREE.Mesh(new THREE.PlaneGeometry(20,40), floorMat);
floor.rotation.x = -Math.PI/2;
floor.position.set(0,0,-14);
floor.receiveShadow = true;
scene.add(floor);

// Ceiling — off white
const ceilMat = new THREE.MeshStandardMaterial({color:0xe8e0d0,roughness:1});
const ceil = new THREE.Mesh(new THREE.PlaneGeometry(20,40), ceilMat);
ceil.rotation.x = Math.PI/2;
ceil.position.set(0,3.4,-14);
scene.add(ceil);

// Walls
const wallMat = new THREE.MeshStandardMaterial({color:0xd4a800,roughness:0.9}); // Blockbuster yellow
function addWall(w,h,x,y,z,ry){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,0.15), wallMat);
  m.position.set(x,y,z); m.rotation.y=ry; m.receiveShadow=true; scene.add(m);
}
addWall(20,3.4,  0,1.7, -34, 0);       // back wall
addWall(40,3.4,-10,1.7, -14, Math.PI/2); // west wall
addWall(40,3.4, 10,1.7, -14, Math.PI/2); // east wall

// ── VHS Box dimensions (in metres) ──
const VHS_H  = 0.19;
const VHS_W  = 0.104;
const VHS_D  = 0.028;

const texLoader = new THREE.TextureLoader();

// ── Shared geometry & plain plastic materials ──────────────
// Created ONCE, reused by every box in the store
// Face-out VHS box geometry:
// +z face (poster) = VHS_W wide × VHS_H tall  ← what player sees
// depth into shelf = VHS_D (2.8cm)
// BoxGeometry(width, height, depth) where:
//   width  = VHS_W (runs along shelf X, this is what separates boxes)
//   height = VHS_H
//   depth  = VHS_D (goes back into shelf)
const VHS_GEO    = new THREE.BoxGeometry(VHS_W, VHS_H, VHS_D);
const MAT_PLASTIC = new THREE.MeshStandardMaterial({color:0xe0d8cc, roughness:0.25, metalness:0.0});
const MAT_TOP     = new THREE.MeshStandardMaterial({color:0xd8d0c4, roughness:0.2,  metalness:0.02});
const MAT_BOTTOM  = new THREE.MeshStandardMaterial({color:0xb8b0a4, roughness:0.4,  metalness:0.0});

// ── Spine canvas — one per box, cached by movie id ─────────
const spineCache = new Map();
function makeSpineTex(movie) {
  if(spineCache.has(movie.id)) return spineCache.get(movie.id);
  const c=document.createElement('canvas'); c.width=64; c.height=512;
  const x=c.getContext('2d');
  // Off-white plastic
  x.fillStyle='#e8e2d8'; x.fillRect(0,0,64,512);
  // Dark label, edge to edge with 2px border
  x.fillStyle='#0a0a14'; x.fillRect(2,2,60,508);
  // Gradient sheen
  const g=x.createLinearGradient(0,0,64,0);
  g.addColorStop(0,'rgba(255,255,255,0.1)'); g.addColorStop(1,'rgba(0,0,0,0.15)');
  x.fillStyle=g; x.fillRect(2,2,60,508);
  // Title rotated vertical — white, tight
  x.save();
  x.translate(32,256); x.rotate(-Math.PI/2);
  x.fillStyle='#ffffff';
  x.font='bold 13px Arial Narrow,Arial';
  x.textAlign='center'; x.textBaseline='middle';
  x.fillText(movie.title.toUpperCase().slice(0,22), 0, 0);
  x.restore();
  // Year at bottom
  x.save();
  x.translate(32,475); x.rotate(-Math.PI/2);
  x.fillStyle='rgba(255,255,255,0.35)';
  x.font='9px Arial'; x.textAlign='center'; x.textBaseline='middle';
  x.fillText(movie.year||'', 0, 0);
  x.restore();
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace;
  spineCache.set(movie.id, t);
  return t;
}

// ── Poster texture cache — loaded lazily by distance ───────
const posterCache = new Map(); // movieId → {tex, loaded, loading}

function getPosterMat(movie) {
  if(!posterCache.has(movie.id)){
    // Placeholder material — genre color
    const mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(`hsl(${movie.hue},40%,20%)`),
      roughness:0.15, metalness:0.0
    });
    posterCache.set(movie.id, {mat, loaded:false, loading:false});
  }
  return posterCache.get(movie.id).mat;
}

function loadPosterIfNeeded(movie) {
  if(!movie.posterSm) return;
  const entry = posterCache.get(movie.id);
  if(!entry || entry.loaded || entry.loading) return;
  entry.loading = true;
  texLoader.load(movie.posterSm, tex=>{
    tex.colorSpace = THREE.SRGBColorSpace;
    entry.mat.map = tex;
    entry.mat.color.set(0xffffff);
    entry.mat.roughness = 0.12;
    entry.mat.needsUpdate = true;
    entry.loaded = true;
  });
}

// ── createVHSBox ────────────────────────────────────────────
// BoxGeometry face order: +x, -x, +y, -y, +z, -z
// Orientation: +z = FRONT (poster, faces player when looking at shelf)
//              -x = SPINE (faces player when box is spine-out on shelf)
//              +y = TOP
function createVHSBox(movie) {
  const spineMat = new THREE.MeshStandardMaterial({
    map: makeSpineTex(movie), roughness:0.2, metalness:0.0
  });
  const posterMat = getPosterMat(movie);

  const mesh = new THREE.Mesh(VHS_GEO, [
    MAT_PLASTIC,  // +x right edge
    spineMat,     // -x SPINE ← faces player when box is spine-out
    MAT_TOP,      // +y top
    MAT_BOTTOM,   // -y bottom
    posterMat,    // +z FRONT poster
    MAT_PLASTIC,  // -z back
  ]);
  mesh.castShadow    = false;
  mesh.receiveShadow = false;
  mesh.userData.movie = movie;
  const group = new THREE.Group();
  group.add(mesh);
  return group;
}

// ── createInspectBox ────────────────────────────────────────
// Full quality box for the pickup view — loads large poster
function createInspectBox(movie) {
  const spineMat = new THREE.MeshStandardMaterial({
    map: makeSpineTex(movie), roughness:0.18, metalness:0.0
  });
  const posterMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(`hsl(${movie.hue},40%,20%)`),
    roughness:0.12, metalness:0.0
  });
  if(movie.posterSm){
    texLoader.load(movie.posterSm, tex=>{
      tex.colorSpace=THREE.SRGBColorSpace;
      posterMat.map=tex; posterMat.color.set(0xffffff);
      posterMat.needsUpdate=true;
    });
  }
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(VHS_D,VHS_H,VHS_W), [
    new THREE.MeshStandardMaterial({color:0xe0d8cc, roughness:0.25}),
    spineMat,
    new THREE.MeshStandardMaterial({color:0xd8d0c4, roughness:0.2, metalness:0.02}),
    new THREE.MeshStandardMaterial({color:0xb8b0a4, roughness:0.4}),
    posterMat,
    new THREE.MeshStandardMaterial({color:0x0a0a14, roughness:0.3}),
  ]);
  mesh.userData.movie = movie;
  const group = new THREE.Group();
  group.add(mesh);
  return group;
}

// ── Lazy poster loading — called each frame for nearby boxes ─
const POSTER_LOAD_DIST = 6.0; // load posters within 6 world units
function updateNearbyPosters() {
  const pos = camera.position;
  for(const box of allBoxes){
    const wp = new THREE.Vector3();
    box.getWorldPosition(wp);
    const dist = pos.distanceTo(wp);
    if(dist < POSTER_LOAD_DIST){
      loadPosterIfNeeded(box.children[0]?.userData.movie);
    }
  }
}

// ═══════════════════════════════════════════════
// SHELF SYSTEM
// ═══════════════════════════════════════════════
// Store layout:
// - Player enters from south (z=+4), walks north (negative z)
// - Perimeter shelves on west and east walls
// - 3 freestanding aisle shelf units
// - Each shelf unit: 6 rows of boxes, 20 boxes per row

const ROWS_PER_UNIT = 7;   // 7 rows — taller shelf
const BOXES_PER_ROW = 30;
// Vertical spacing = VHS_H + twice the side gap (VHS_D*2)
const ROW_SPACING   = VHS_H + VHS_D * 2;
const BOX_SPACING   = VHS_D + 0.003;
// Face-out: poster (+z face) faces the player
// Box depth (VHS_D=0.028m) runs along shelf length
// Box width (VHS_W=0.104m) goes back into shelf
const BOX_ALONG_SHELF = VHS_W + VHS_D; // box width + spine-width gap between each

// Shelf plank material
const shelfMat = new THREE.MeshStandardMaterial({color:0x3a2208, roughness:0.8, metalness:0.05});
const shelfBackMat = new THREE.MeshStandardMaterial({color:0x241405, roughness:0.9});

// Track how many movies from each genre pool have been used across all shelf units
// so no movie ever appears twice in the entire store
const genrePoolOffset = new Array(GENRES.length).fill(0);

// All interactive VHS boxes
const allBoxes = [];

const colliders = [];

function isBlocked(x, z) {
  // Outer store walls
  if(x < -9.2 || x > 9.2 || z < -33 || z > 4.8) return true;
  // Shelf colliders
  for(const c of colliders){
    if(x > c.minX && x < c.maxX && z > c.minZ && z < c.maxZ) return true;
  }
  return false;
}

function tryMove(dx, dz) {
  const nx = camera.position.x + dx;
  const nz = camera.position.z + dz;
  if(!isBlocked(nx, camera.position.z)) camera.position.x = nx;
  if(!isBlocked(camera.position.x, nz)) camera.position.z = nz;
}

// Pre-built sign textures — one per genre, built once
const signTextures = GENRES.map((g, gi) => {
  const c = document.createElement('canvas'); c.width=256; c.height=48;
  const x = c.getContext('2d');
  x.fillStyle = `#${g.color.toString(16).padStart(6,'0')}`;
  x.fillRect(0,0,256,48);
  x.fillStyle = 'rgba(0,0,0,0.85)';
  x.font = 'bold 22px Arial Black,Arial';
  x.textAlign='center'; x.textBaseline='middle';
  x.fillText(g.label, 128, 24);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
});
const signMats = signTextures.map(t =>
  new THREE.MeshLambertMaterial({map: t})
);

// Shared shelf plank geometry (reused across all shelves)
const PLANK_GEO = new THREE.BoxGeometry(1, 0.018, 0.17); // scaled per shelf
const BACK_GEO  = new THREE.BoxGeometry(1, 1, 0.04);     // scaled per shelf
const SIDE_GEO  = new THREE.BoxGeometry(0.025, 1, 0.17); // scaled per shelf
const SIGN_GEO  = new THREE.BoxGeometry(1, 0.25, 0.04);  // scaled per shelf

function createShelfUnit(posX, posZ, rotY, genreIdx, label, length=4.0) {
  const group = new THREE.Group();
  // Raise shelf so middle rows are at eye height (1.65m)
  // Shelf height = ROWS_PER_UNIT * ROW_SPACING = 8 * 0.20 = 1.6m
  // To center: base at 1.65 - 0.8 = 0.85m
  group.position.set(posX, 0, posZ);
  group.rotation.y = rotY;
  scene.add(group);

  const pool = POOL[genreIdx];
  if(!pool||!pool.length) return;

  // Use actual box area width for shelf (not full length) to avoid empty sides
  const boxCount0  = Math.min(Math.floor(length / BOX_ALONG_SHELF), BOXES_PER_ROW);
  const shelfWidth = boxCount0 * BOX_ALONG_SHELF;

  const shelfDepth = VHS_W + 0.05;
  const shelfH     = ROWS_PER_UNIT * ROW_SPACING + 0.1;

  // Back panel — matches box area width exactly
  const back = new THREE.Mesh(BACK_GEO, shelfBackMat);
  back.scale.set(shelfWidth, shelfH, 1);
  back.position.set(0, shelfH/2, -shelfDepth/2);
  group.add(back);

  // Shelf planks — same width as box area
  for(let r=0; r<=ROWS_PER_UNIT; r++){
    const plank = new THREE.Mesh(PLANK_GEO, shelfMat);
    plank.scale.set(shelfWidth, 1, shelfDepth/0.17);
    plank.position.set(0, r*ROW_SPACING, -shelfDepth/2);
    group.add(plank);
  }

  // Sign — uses pre-built material, no new canvas
  const sign = new THREE.Mesh(SIGN_GEO, signMats[genreIdx]);
  sign.scale.set(Math.min(length, 2.5), 1, 1);
  sign.position.set(0, shelfH + 0.18, -0.02);
  group.add(sign);

  // Collision
  const hw = shelfWidth/2 + 0.1, hd = shelfDepth + 0.1;
  const cos = Math.cos(rotY), sin = Math.sin(rotY);
  const corners = [[-hw,-hd],[-hw,0],[hw,-hd],[hw,0]].map(([lx,lz])=>({
    wx: posX + lx*cos - lz*sin,
    wz: posZ + lx*sin + lz*cos,
  }));
  colliders.push({
    minX: Math.min(...corners.map(c=>c.wx)) - 0.05,
    maxX: Math.max(...corners.map(c=>c.wx)) + 0.05,
    minZ: Math.min(...corners.map(c=>c.wz)) - 0.05,
    maxZ: Math.max(...corners.map(c=>c.wz)) + 0.05,
  });

  // Place boxes — fill from TOP row down, so empty rows are at the bottom
  const boxCount  = Math.min(Math.floor(length / BOX_ALONG_SHELF), BOXES_PER_ROW);
  const totalBoxW = boxCount * BOX_ALONG_SHELF;
  const startX    = -totalBoxW/2 + BOX_ALONG_SHELF/2;
  const startOffset = genrePoolOffset[genreIdx];
  let placed = 0;

  for(let row=0; row<ROWS_PER_UNIT; row++){
    // Invert row so row 0 fills at top, empty rows fall to bottom
    const displayRow = ROWS_PER_UNIT - 1 - row;
    for(let col=0; col<boxCount; col++){
      const idx = startOffset + (row * boxCount + col);
      if(idx >= pool.length) break;
      const movie = pool[idx];
      if(!movie) continue;
      placed++;
      const box = createVHSBox(movie);
      box.position.set(
        startX + col*BOX_ALONG_SHELF,
        displayRow * ROW_SPACING + VHS_H/2 + 0.018,
        -VHS_D/2
      );
      box.userData.shelfPos   = box.position.clone();
      box.userData.shelfGroup = group;
      group.add(box);
      allBoxes.push(box);
    }
  }
  genrePoolOffset[genreIdx] += placed;
}

const isMobile = 'ontouchstart' in window;

// ── Place all shelf units ──
async function buildStore() {
  const st = document.getElementById('ld-st');
  const wallLen  = isMobile ? 5 : 8;
  const aisleLen = isMobile ? 4 : 7;

  const units = [
    [ 8.5, -2,  Math.PI, 0, 'NEW RELEASES', wallLen],
    [ 8.5, -9,  Math.PI, 1, 'ACTION',       wallLen],
    [ 8.5,-16,  Math.PI, 2, 'COMEDY',       wallLen],
    [ 8.5,-23,  Math.PI, 3, 'HORROR',       wallLen],
    [-8.5, -2,  0,       4, 'DRAMA',        wallLen],
    [-8.5, -9,  0,       5, 'SCI-FI',       wallLen],
    [-8.5,-16,  0,       6, 'THRILLER',     wallLen],
    [-8.5,-23,  0,       7, 'ANIMATION',    wallLen],
    [ 0,-10,  0,         0, 'NEW RELEASES', aisleLen],
    [ 0,-10,  Math.PI,   1, 'ACTION',       aisleLen],
    [ 0,-18,  0,         2, 'COMEDY',       aisleLen],
    [ 0,-18,  Math.PI,   3, 'HORROR',       aisleLen],
    [ 0,-26,  0,         4, 'DRAMA',        aisleLen],
    [ 0,-26,  Math.PI,   5, 'SCI-FI',       aisleLen],
    [ 0,-33, -Math.PI/2, 6, 'THRILLER',     isMobile ? 6 : 14],
  ];

  for(let i=0; i<units.length; i++){
    const u = units[i];
    st.textContent = `Placing ${u[4]}... (${i+1}/${units.length})`;
    try {
      createShelfUnit(u[0], u[1], u[2], u[3], u[4], u[5]);
    } catch(e) {
      st.textContent = `ERROR on shelf ${i+1}: ${e.message}`;
      console.error(e);
      await new Promise(r=>setTimeout(r,5000));
      return;
    }
    await new Promise(r=>setTimeout(r,10));
  }
}

// ── Mobile joystick state ──
let joyOn=false, joyX=0, joyY=0;
let lookOn=false, lookLastX=0, lookLastY=0;

if(isMobile){
  const jZ = document.getElementById('jz');
  const jD = document.getElementById('jd');
  jZ.addEventListener('touchstart',e=>{joyOn=true;e.preventDefault();},{passive:false});
  jZ.addEventListener('touchend',()=>{joyOn=false;joyX=0;joyY=0;jD.style.transform='translate(-50%,-50%)';});
  jZ.addEventListener('touchmove',e=>{
    if(!joyOn)return;e.preventDefault();
    const t=e.touches[0],r=jZ.getBoundingClientRect();
    let dx=t.clientX-(r.left+r.width/2),dy=t.clientY-(r.top+r.height*0.65);
    const d=Math.sqrt(dx*dx+dy*dy),mx=34;
    if(d>mx){dx=dx/d*mx;dy=dy/d*mx;}
    joyX=dx/mx;joyY=dy/mx;
    jD.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
  },{passive:false});

  const lZ = document.getElementById('lz');
  lZ.addEventListener('touchstart',e=>{
    if(inspectOpen)return;
    lookOn=true;lookLastX=e.touches[0].clientX;lookLastY=e.touches[0].clientY;
    e.preventDefault();
  },{passive:false});
  lZ.addEventListener('touchend',()=>lookOn=false);
  lZ.addEventListener('touchmove',e=>{
    if(!lookOn||inspectOpen)return;e.preventDefault();
    const dx=e.touches[0].clientX-lookLastX;
    const dy=e.touches[0].clientY-lookLastY;
    camera.rotation.order='YXZ';
    camera.rotation.y -= dx*0.004;
    camera.rotation.x -= dy*0.003;
    camera.rotation.x=Math.max(-Math.PI/3,Math.min(Math.PI/3,camera.rotation.x));
    lookLastX=e.touches[0].clientX;lookLastY=e.touches[0].clientY;
  },{passive:false});

  // Tap on a box to pick it up (tap right side near center)
  lZ.addEventListener('touchend',e=>{
    if(inspectOpen)return;
    // Raycast from screen center on tap
    checkHover();
    if(hoveredBox) openInspect(hoveredBox);
  },{passive:false});
}

const SPEED = 0.055;
const moveDir = new THREE.Vector3();

function updateMovement() {
  if(isMobile){
    if(joyOn && (Math.abs(joyX)>0.05 || Math.abs(joyY)>0.05)){
      const forward = new THREE.Vector3(-Math.sin(camera.rotation.y), 0, -Math.cos(camera.rotation.y));
      const right   = new THREE.Vector3( Math.cos(camera.rotation.y), 0, -Math.sin(camera.rotation.y));
      tryMove(
        (forward.x * (-joyY) + right.x * joyX) * SPEED * 1.2,
        (forward.z * (-joyY) + right.z * joyX) * SPEED * 1.2
      );
    }
    camera.position.y = 1.65;
    return;
  }
  if(!controls.isLocked) return;
  moveDir.set(0,0,0);
  if(keys['w']||keys['arrowup'])    moveDir.z -= 1;
  if(keys['s']||keys['arrowdown'])  moveDir.z += 1;
  if(keys['a']||keys['arrowleft'])  moveDir.x -= 1;
  if(keys['d']||keys['arrowright']) moveDir.x += 1;
  if(moveDir.length()>0){
    moveDir.normalize().multiplyScalar(SPEED);
    const fwd = new THREE.Vector3(-Math.sin(camera.rotation.y), 0, -Math.cos(camera.rotation.y));
    const rgt = new THREE.Vector3( Math.cos(camera.rotation.y), 0, -Math.sin(camera.rotation.y));
    tryMove(
      (fwd.x * (-moveDir.z) + rgt.x * moveDir.x),
      (fwd.z * (-moveDir.z) + rgt.z * moveDir.x)
    );
  }
  const p = controls.getObject().position;
  p.x = camera.position.x;
  p.z = camera.position.z;
  p.y = 1.65;
}

// RAYCASTING — BOX HOVER & CLICK
// ═══════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const center = new THREE.Vector2(0,0);
let hoveredBox = null;
let inspectOpen = false;
let currentMovie = null;

function checkHover() {
  raycaster.setFromCamera(center, camera);
  // Only cast against VHS meshes
  const meshes = allBoxes.map(b=>b.children[0]).filter(Boolean);
  const hits = raycaster.intersectObjects(meshes);
  if(hits.length>0 && hits[0].distance<2.2){
    const box = hits[0].object.parent;
    if(box!==hoveredBox){
      hoveredBox=box;
      document.getElementById('hint').classList.add('show');
    }
  } else {
    hoveredBox=null;
    document.getElementById('hint').classList.remove('show');
  }
}

renderer.domElement.addEventListener('click', ()=>{
  if(inspectOpen) return;
  if(hoveredBox&&controls.isLocked){
    openInspect(hoveredBox);
  }
});

let inspectBox = null; // the box mesh in inspect scene

function openInspect(boxGroup) {
  const movie = boxGroup.children[0]?.userData.movie;
  if(!movie) return;
  currentMovie = movie;
  inspectOpen = true;
  controls.unlock();

  // Populate info panel
  document.getElementById('info-title').textContent = movie.title;
  document.getElementById('info-meta').textContent = `${movie.year}  ·  ★ ${movie.rating}`;
  document.getElementById('info-genre').textContent = movie.genre;
  document.getElementById('info-genre').style.background = movie.genreColor||'#1565C0';
  document.getElementById('info-rating').textContent = `★ ${movie.rating}`;
  document.getElementById('info-desc').textContent = movie.desc;

  // Clone the box mesh into the inspect scene
  if(inspectBox){ iScene.remove(inspectBox); inspectBox=null; }
  inspectBox = createInspectBox(movie);
  inspectBox.position.set(0,0,0);
  inspectBox.rotation.set(0,0,0);

  iScene.add(inspectBox);

  // Show overlay
  document.getElementById('inspect').classList.add('open');

  // Resize inspect renderer
  resizeInspect();
}

window.closeInspect = function() {
  inspectOpen = false;
  document.getElementById('inspect').classList.remove('open');
  if(inspectBox){ iScene.remove(inspectBox); inspectBox=null; }
  currentMovie = null;
};

window.watchMovie = function() {
  if(!currentMovie) return;
  window.open(`https://www.google.com/search?q=watch+${encodeURIComponent(currentMovie.title)}+streaming`,'_blank');
};

function resizeInspect() {
  const W2=window.innerWidth, H2=window.innerHeight;
  iRenderer.setSize(W2,H2);
  iCamera.aspect=W2/H2;
  iCamera.updateProjectionMatrix();
}

// ── Inspect drag to rotate ──
let isDragging=false, lastX=0, lastY=0;
let rotX=0.1, rotY2=Math.PI; // start showing poster face (+z is spine, -z is poster, so rotate 180° to show poster)

inspectCanvas.addEventListener('mousedown', e=>{isDragging=true;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener('mouseup', ()=>isDragging=false);
window.addEventListener('mousemove', e=>{
  if(!isDragging||!inspectBox) return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  rotY2 += dx*0.01;
  rotX  += dy*0.01;
  rotX=Math.max(-Math.PI,Math.min(Math.PI,rotX));
  lastX=e.clientX; lastY=e.clientY;
});

// Touch rotate
let lastTX=0,lastTY=0;
inspectCanvas.addEventListener('touchstart', e=>{
  isDragging=true;
  lastTX=e.touches[0].clientX;lastTY=e.touches[0].clientY;
  e.preventDefault();
},{passive:false});
inspectCanvas.addEventListener('touchend', ()=>isDragging=false);
inspectCanvas.addEventListener('touchmove', e=>{
  if(!isDragging||!inspectBox) return;
  const dx=e.touches[0].clientX-lastTX, dy=e.touches[0].clientY-lastTY;
  rotY2+=dx*0.012; rotX+=dy*0.012;
  rotX=Math.max(-Math.PI,Math.min(Math.PI,rotX));
  lastTX=e.touches[0].clientX;lastTY=e.touches[0].clientY;
  e.preventDefault();
},{passive:false});

// ── Auto-rotate when not dragging ──
let autoRotateTimer=null;
function resetAutoRotate(){
  clearTimeout(autoRotateTimer);
  autoRotateTimer=setTimeout(()=>isDragging=false,2000);
}

// WALL POSTERS — classic 80s/90s movies
// ═══════════════════════════════════════════════
const CLASSIC_IDS = [
  603,   // The Matrix
  857,   // Saving Private Ryan
  539,   // Pulp Fiction
  1891,  // The Empire Strikes Back
  8587,  // The Lion King
  769,   // Goodfellas
  1370,  // Die Hard
  11,    // Star Wars
  289,   // Schindler's List
  8467,  // Home Alone
  1726,  // Iron Man
  218,   // The Terminator
];

const wallPosterFrames = [];

async function buildWallPosters() {
  // Fetch classic movie posters from TMDB
  const movies = await Promise.all(CLASSIC_IDS.map(id=>
    fetch(`${TMDB_BASE}/movie/${id}?api_key=${TMDB_KEY}`)
      .then(r=>r.ok?r.json():null).catch(()=>null)
  ));

  // Wall poster positions — on the east and west yellow walls
  // between the shelf units (in the gaps between z=-2,-9,-16,-23)
  const posterPositions = [
    // East wall (x=9.85, facing west)
    {wx:9.85, wy:1.4, wz:-5.5,  ry:-Math.PI/2},
    {wx:9.85, wy:1.4, wz:-12.5, ry:-Math.PI/2},
    {wx:9.85, wy:1.4, wz:-19.5, ry:-Math.PI/2},
    {wx:9.85, wy:1.4, wz:-27,   ry:-Math.PI/2},
    // West wall (x=-9.85, facing east)
    {wx:-9.85, wy:1.4, wz:-5.5,  ry:Math.PI/2},
    {wx:-9.85, wy:1.4, wz:-12.5, ry:Math.PI/2},
    {wx:-9.85, wy:1.4, wz:-19.5, ry:Math.PI/2},
    {wx:-9.85, wy:1.4, wz:-27,   ry:Math.PI/2},
  ];

  const validMovies = movies.filter(Boolean);

  for(let i=0; i<posterPositions.length && i<validMovies.length; i++){
    const m = validMovies[i];
    const pos = posterPositions[i];
    if(!m.poster_path) continue;

    // Frame dimensions — big and bold, portrait VHS-like ratio
    const frameW = 1.4, frameH = 2.1;

    // Dark wooden frame
    const frameMesh = new THREE.Mesh(
      new THREE.BoxGeometry(frameW+0.08, frameH+0.08, 0.04),
      new THREE.MeshStandardMaterial({color:0x1a0e04, roughness:0.8})
    );
    frameMesh.position.set(pos.wx, pos.wy, pos.wz);
    frameMesh.rotation.y = pos.ry;
    scene.add(frameMesh);

    // Poster face
    const posterMat = new THREE.MeshStandardMaterial({
      color:0x444444, roughness:0.15
    });
    const posterMesh = new THREE.Mesh(
      new THREE.BoxGeometry(frameW, frameH, 0.02),
      posterMat
    );
    posterMesh.position.set(pos.wx, pos.wy, pos.wz);
    posterMesh.rotation.y = pos.ry;
    // Offset slightly in front of frame
    posterMesh.position.x += Math.sin(pos.ry) * 0.03;
    posterMesh.position.z += Math.cos(pos.ry) * 0.03;
    scene.add(posterMesh);
    wallPosterFrames.push(posterMesh);

    // Load poster texture
    const url = `https://image.tmdb.org/t/p/w342${m.poster_path}`;
    texLoader.load(url, tex=>{
      tex.colorSpace = THREE.SRGBColorSpace;
      posterMat.map = tex;
      posterMat.color.set(0xffffff);
      posterMat.needsUpdate = true;
    });

    // Movie title below poster
    const titleC = document.createElement('canvas'); titleC.width=256; titleC.height=48;
    const tx = titleC.getContext('2d');
    tx.fillStyle='#1a0e04'; tx.fillRect(0,0,256,48);
    tx.fillStyle='#FFD700'; tx.font='bold 18px Arial Black,Arial';
    tx.textAlign='center'; tx.textBaseline='middle';
    tx.fillText(m.title.toUpperCase().slice(0,22), 128, 24);
    const titleTex = new THREE.CanvasTexture(titleC);
    titleTex.colorSpace = THREE.SRGBColorSpace;
    const titleMesh = new THREE.Mesh(
      new THREE.BoxGeometry(frameW+0.08, 0.18, 0.02),
      new THREE.MeshStandardMaterial({map:titleTex, roughness:0.5})
    );
    titleMesh.position.set(pos.wx, pos.wy - frameH/2 - 0.12, pos.wz);
    titleMesh.rotation.y = pos.ry;
    titleMesh.position.x += Math.sin(pos.ry)*0.03;
    titleMesh.position.z += Math.cos(pos.ry)*0.03;
    scene.add(titleMesh);
  }
}

  {name:'Morgan', color:0x44aa66, startX: 2, startZ:-28, wanderZ:[-22,-32], wanderSpeed:0.75},
];

function buildEmployees(){
  for(const def of EMPLOYEE_DEFS){
    const group = new THREE.Group();

    // Body
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(0.4, 0.7, 0.25),
      new THREE.MeshStandardMaterial({color:def.color, roughness:0.7})
    );
    body.position.y = 0.95;
    group.add(body);

    // Head
    const head = new THREE.Mesh(
      new THREE.BoxGeometry(0.28, 0.28, 0.28),
      new THREE.MeshStandardMaterial({color:0xf5d5b0, roughness:0.6})
    );
    head.position.y = 1.44;
    group.add(head);

    // Name tag
    const nameC = document.createElement('canvas'); nameC.width=128; nameC.height=48;
    const nx = nameC.getContext('2d');
    nx.fillStyle='#ffffff'; nx.fillRect(0,0,128,48);
    nx.fillStyle='#cc0000'; nx.font='bold 14px Arial'; nx.textAlign='center'; nx.textBaseline='middle';
    nx.fillText('BLOCKBROWSER', 64, 14);
    nx.fillStyle='#000'; nx.font='bold 18px Arial'; nx.fillText(def.name, 64, 34);
    const nameTex = new THREE.CanvasTexture(nameC);
    nameTex.colorSpace = THREE.SRGBColorSpace;
    const nameTag = new THREE.Mesh(
      new THREE.BoxGeometry(0.22, 0.08, 0.01),
      new THREE.MeshStandardMaterial({map:nameTex})
    );
    nameTag.position.set(0, 0.88, 0.13);
    group.add(nameTag);

    // Legs
    for(const lx of [-0.1, 0.1]){
      const leg = new THREE.Mesh(
        new THREE.BoxGeometry(0.14, 0.6, 0.18),
        new THREE.MeshStandardMaterial({color:0x222244, roughness:0.8})
      );
      leg.position.set(lx, 0.3, 0);
      group.add(leg);
    }

    group.position.set(def.startX, 0, def.startZ);
    scene.add(group);

    employees.push({
      group, def, name:def.name,
      wanderDir: 1, wanderSpeed: 0.008,
      wanderTimer: 0,
      targetZ: def.startZ,
    });
  }
}

function updateEmployees(dt){
  if(talkingTo) return;
  for(const emp of employees){
    emp.wanderTimer += dt;
    // Walk toward target Z
    const dz = emp.targetZ - emp.group.position.z;
    if(Math.abs(dz) < 0.1){
      // Pick new target
      const [minZ, maxZ] = emp.def.wanderZ;
      emp.targetZ = minZ + Math.random()*(maxZ-minZ);
    } else {
      const step = Math.sign(dz) * emp.wanderSpeed * (dt / 1000);
      emp.group.position.z += step;
      emp.group.rotation.y = dz > 0 ? Math.PI : 0;
    }
    // Bob up and down slightly while walking
    emp.group.position.y = Math.sin(emp.wanderTimer*0.003)*0.02;
  }
}

// EMPLOYEE INTERACTION & SEARCH
// ═══════════════════════════════════════════════
const GENRE_SHELF_LABELS = {
  'NEW RELEASES': 'the New Releases shelf on the east wall',
  'ACTION':       'the Action shelf on the east wall',
  'COMEDY':       'the Comedy shelf on the east wall',
  'HORROR':       'the Horror shelf on the east wall',
  'DRAMA':        'the Drama shelf on the west wall',
  'SCI-FI':       'the Sci-Fi shelf on the west wall',
  'THRILLER':     'the Thriller shelf on the west wall',
  'ANIMATION':    'the Animation shelf on the west wall',
};

function searchMovies(query){
  const q = query.toLowerCase();
  const results = [];
  const seen = new Set();
  for(const pool of POOL){
    for(const m of pool){
      if(seen.has(m.id)) continue;
      const score =
        (m.title.toLowerCase().includes(q) ? 3 : 0) +
        (m.genre.toLowerCase().includes(q) ? 2 : 0) +
        (m.desc.toLowerCase().includes(q)  ? 1 : 0);
      if(score > 0){ results.push({m, score}); seen.add(m.id); }
    }
  }
  results.sort((a,b)=>b.score-a.score);
  return results.slice(0,5).map(r=>r.m);
}

function employeeResponse(empName, query){
  const q = query.toLowerCase();

  // Greeting / small talk
  if(q.match(/^(hi|hello|hey|sup|what's up|howdy)/)){
    return `Hey! I'm ${empName}. Looking for something to watch? Just ask me — I know every title in this store!`;
  }

  // Recommendation request
  if(q.match(/recommend|suggestion|what should|good movie|best|popular/)){
    const genres = Object.keys(GENRE_SHELF_LABELS);
    const randomGenre = genres[Math.floor(Math.random()*genres.length)];
    const pool = POOL.find(p=>p[0]?.genre===randomGenre) || POOL[0];
    const pick = pool[Math.floor(Math.random()*Math.min(5,pool.length))];
    if(pick) return `I'd recommend <b>${pick.title}</b> (${pick.year}, ★${pick.rating})! You'll find it on ${GENRE_SHELF_LABELS[pick.genre] || 'one of our shelves'}. Great choice!`;
  }

  // Search by title/genre/keyword
  const matches = searchMovies(query);
  if(matches.length === 0){
    return `Hmm, I don't think we carry anything matching "<i>${query}</i>" right now. Try a different title or genre — we've got Action, Comedy, Horror, Drama, Sci-Fi, Thriller, and Animation!`;
  }
  if(matches.length === 1){
    const m = matches[0];
    return `Found it! <b>${m.title}</b> (${m.year}, ★${m.rating}) — head to ${GENRE_SHELF_LABELS[m.genre] || 'one of our shelves'}. ${m.desc.slice(0,80)}…`;
  }
  const list = matches.map(m=>`<b>${m.title}</b> (${m.year}, ★${m.rating})`).join('<br>');
  return `Found ${matches.length} matches:<br>${list}<br><br>They're in the ${matches[0].genre} section — ${GENRE_SHELF_LABELS[matches[0].genre] || 'check the shelves'}!`;
}

// Check if player is near an employee
function checkEmployeeProximity(){
  if(talkingTo) return;
  const pos = camera.position;
  let nearest = null, nearestDist = 2.2;
  for(const emp of employees){
    const dx = emp.group.position.x - pos.x;
    const dz = emp.group.position.z - pos.z;
    const dist = Math.sqrt(dx*dx+dz*dz);
    if(dist < nearestDist){ nearestDist=dist; nearest=emp; }
  }
  window._nearestEmp = nearest;
  // Update hint separately — only if no box is being hovered
  const hintEl = document.getElementById('hint');
  if(hintEl && nearest && !hitMovie){
    hintEl.textContent = `[ E ] TALK TO ${nearest.name.toUpperCase()}`;
    hintEl.classList.add('show');
  }
}
const labelEl = document.getElementById('section-label');
let lastLabel='',labelTimer=null;
function updateLabel(){
  const z = isMobile ? camera.position.z : controls.getObject().position.z;
  let lbl='';
  if(z>2)          lbl='ENTRANCE';
  else if(z>-6)   lbl='🎬 NEW RELEASES · 🎭 DRAMA';
  else if(z>-14)  lbl='💥 ACTION · 🚀 SCI-FI';
  else if(z>-22)  lbl='😂 COMEDY · 😱 THRILLER';
  else if(z>-30)  lbl='👻 HORROR · 🎨 ANIMATION';
  else             lbl='⭐ BACK WALL';
  if(lbl!==lastLabel){
    lastLabel=lbl;labelEl.textContent=lbl;
    labelEl.classList.add('show');clearTimeout(labelTimer);
    labelTimer=setTimeout(()=>labelEl.classList.remove('show'),2400);
  }
}

let frameId;
let lastTime = performance.now();
function animate(){
  frameId=requestAnimationFrame(animate);
  const now = performance.now();
  const dt = now - lastTime; lastTime = now;
  updateMovement();
  if(!inspectOpen && !talkingTo){
    checkHover();
    checkEmployeeProximity();
  }
  if(!inspectOpen) updateNearbyPosters();
  updateEmployees(dt);
  renderer.render(scene,camera);

  // Inspect view
  if(inspectOpen&&inspectBox){
    if(!isDragging){
      rotY2 += 0.003; // gentle auto-rotate
    }
    inspectBox.rotation.x = rotX;
    inspectBox.rotation.y = rotY2;
    iRenderer.render(iScene,iCamera);
  }

  updateLabel();
}

// INIT
// ═══════════════════════════════════════════════
async function init(){
  const bar=document.getElementById('ld-br'),st=document.getElementById('ld-st');
  const retry=document.getElementById('ld-re');
  retry.style.display='none'; bar.style.width='0%';
  let fail=false;
  for(let i=0;i<GENRES.length;i++){
    st.textContent=`Loading ${GENRES[i].label}...`;
    try{await fetchGenre(GENRES[i],i);}catch(e){console.warn(e);fail=true;}
    bar.style.width=`${Math.round((i+1)/GENRES.length*100)}%`;
  }
  if(fail&&POOL.every(p=>!p.length)){
    st.textContent='Connection failed.';retry.style.display='block';return;
  }
  st.textContent='Building store...';
  try {
    await buildStore();
    await buildWallPosters();
    buildEmployees();
  } catch(e) {
    st.textContent = 'CRASH: ' + e.message;
    console.error(e);
    document.getElementById('ld-re').style.display='block';
    return;
  }
  st.textContent=`Ready! (${allBoxes.length} boxes placed)`;
  // Show box count briefly in HUD
  const countEl = document.createElement('div');
  countEl.style.cssText='position:fixed;top:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#0f0;font-family:monospace;font-size:14px;padding:6px 12px;border-radius:4px;z-index:999;';
  countEl.textContent = `${allBoxes.length} boxes in scene`;
  document.body.appendChild(countEl);
  setTimeout(()=>countEl.remove(), 8000);
  await new Promise(r=>setTimeout(r,300));
  document.getElementById('loading').classList.add('out');
  setTimeout(()=>document.getElementById('loading').style.display='none',600);

  // Start render loop
  animate();

  // Auto-lock pointer on click
  st.textContent='Click to enter store';
}

window.init = init;
init();
