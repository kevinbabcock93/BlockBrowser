<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BlockBrowse</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=VT323&family=Barlow:wght@400;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; width:100vw; height:100vh; font-family:'Barlow',sans-serif; touch-action:none; }
  #canvas { display:block; width:100vw; height:100vh; }
  #hud { position:fixed; inset:0; pointer-events:none; z-index:10; }
  #store-sign {
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    background:#FFD700; color:#1a1a1a;
    font-family:'Bebas Neue',cursive; font-size:24px; letter-spacing:4px;
    padding:5px 24px 3px; border-radius:2px;
    box-shadow:0 0 24px rgba(255,215,0,0.7), 0 0 60px rgba(255,215,0,0.2);
    border:3px solid #b8860b; white-space:nowrap;
  }
  #store-sign span { color:#1565C0; }
  #crosshair {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:20px; height:20px;
  }
  #crosshair::before,#crosshair::after { content:''; position:absolute; background:rgba(255,255,255,0.8); }
  #crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
  #crosshair::after  { height:2px; width:100%; top:50%; transform:translateY(-50%); }
  #aisle-label {
    position:absolute; top:64px; left:50%; transform:translateX(-50%);
    font-family:'VT323',monospace; font-size:20px; color:#FFD700;
    letter-spacing:3px; text-shadow:0 0 10px rgba(255,215,0,0.6);
    opacity:0; transition:opacity 0.4s; white-space:nowrap;
  }
  #aisle-label.show { opacity:1; }

  /* Loading */
  #loading {
    position:fixed; inset:0; background:#000; z-index:200;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:opacity 0.6s;
  }
  #loading.out { opacity:0; pointer-events:none; }
  #loading-logo { font-family:'Bebas Neue',cursive; font-size:clamp(40px,10vw,70px); letter-spacing:6px; color:#FFD700; text-shadow:0 0 30px rgba(255,215,0,0.4); margin-bottom:8px; }
  #loading-logo span { color:#1565C0; }
  #loading-text { font-family:'VT323',monospace; font-size:16px; color:rgba(255,255,255,0.5); letter-spacing:3px; margin-bottom:28px; }
  #loading-bar-wrap { width:240px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
  #loading-bar { height:100%; width:0%; background:#FFD700; border-radius:3px; transition:width 0.3s ease; box-shadow:0 0 10px rgba(255,215,0,0.6); }
  #loading-status { font-size:11px; color:rgba(255,255,255,0.35); margin-top:12px; letter-spacing:1px; }

  /* Movie card */
  #movie-card {
    position:absolute; right:16px; top:50%; transform:translateY(-50%);
    width:200px; background:rgba(8,8,20,0.96);
    border:1px solid rgba(255,215,0,0.5); border-radius:8px;
    overflow:hidden; opacity:0; transition:opacity 0.25s; pointer-events:all;
  }
  #movie-card.show { opacity:1; }
  #mc-poster { width:100%; height:120px; object-fit:cover; display:none; }
  #mc-poster-placeholder { width:100%; height:120px; display:flex; align-items:center; justify-content:center; font-size:44px; background:#111; }
  #mc-body { padding:10px; }
  #mc-title { font-family:'Bebas Neue',cursive; font-size:17px; color:#FFD700; line-height:1.1; margin-bottom:2px; }
  #mc-meta  { font-size:10px; color:rgba(255,255,255,0.45); margin-bottom:5px; }
  #mc-genre { display:inline-block; background:#1565C0; color:#fff; font-size:9px; padding:2px 7px; border-radius:3px; letter-spacing:1px; text-transform:uppercase; margin-bottom:7px; }
  #mc-rating { display:inline-block; background:#c0a800; color:#000; font-size:9px; padding:2px 7px; border-radius:3px; letter-spacing:1px; margin-bottom:7px; margin-left:4px; font-weight:600; }
  #mc-desc  { font-size:10px; color:rgba(255,255,255,0.7); line-height:1.4; margin-bottom:9px; }
  #mc-btn { width:100%; background:#FFD700; color:#111; border:none; font-family:'Bebas Neue',cursive; font-size:16px; letter-spacing:2px; padding:6px; border-radius:4px; cursor:pointer; pointer-events:all; }
  #mc-btn:hover { background:#ffe84d; }

  #controls { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:8px; align-items:center; }
  .ck { background:rgba(0,0,0,0.75); border:1px solid rgba(255,255,255,0.18); border-radius:6px; padding:5px 12px; font-size:11px; color:rgba(255,255,255,0.65); letter-spacing:1px; white-space:nowrap; }
  .ck strong { color:#FFD700; font-family:'VT323',monospace; font-size:14px; }

  #joystick-zone { position:absolute; left:0; bottom:0; width:50%; height:45%; pointer-events:all; display:none; }
  #look-zone { position:absolute; right:0; bottom:0; width:50%; height:45%; pointer-events:all; display:none; }
  #joystick-pad { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); width:80px; height:80px; border-radius:50%; border:2px solid rgba(255,215,0,0.4); background:rgba(255,215,0,0.08); }
  #joystick-dot { position:absolute; width:28px; height:28px; border-radius:50%; background:rgba(255,215,0,0.6); top:50%; left:50%; transform:translate(-50%,-50%); }
  #interact-btn { position:absolute; right:20px; bottom:80px; width:60px; height:60px; border-radius:50%; background:rgba(255,215,0,0.15); border:2px solid rgba(255,215,0,0.5); color:#FFD700; font-family:'Bebas Neue',cursive; font-size:22px; display:none; align-items:center; justify-content:center; pointer-events:all; cursor:pointer; }

  #intro { position:fixed; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; transition:opacity 0.7s; }
  #intro.out { opacity:0; pointer-events:none; }
  #intro-logo { font-family:'Bebas Neue',cursive; font-size:clamp(48px,12vw,80px); letter-spacing:6px; color:#FFD700; text-shadow:0 0 40px rgba(255,215,0,0.5); margin-bottom:4px; }
  #intro-logo span { color:#1565C0; }
  #intro-sub { font-family:'VT323',monospace; font-size:18px; color:rgba(255,255,255,0.55); letter-spacing:4px; margin-bottom:44px; }
  #intro-btn { background:#FFD700; color:#111; border:none; font-family:'Bebas Neue',cursive; font-size:24px; letter-spacing:4px; padding:13px 44px; border-radius:4px; cursor:pointer; box-shadow:0 0 30px rgba(255,215,0,0.35); }
  #intro-tag { font-size:12px; color:rgba(255,255,255,0.3); margin-top:18px; letter-spacing:2px; }

  #toast { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.92); border:1px solid #FFD700; border-radius:10px; padding:20px 24px; text-align:center; font-family:'Bebas Neue',cursive; font-size:20px; color:#FFD700; letter-spacing:2px; width:270px; display:none; pointer-events:all; z-index:50; }
  #toast-poster { width:80px; height:110px; object-fit:cover; border-radius:4px; margin:0 auto 10px; display:block; background:#222; }
  #toast p { font-family:'Barlow',sans-serif; font-size:12px; color:rgba(255,255,255,0.7); margin-top:6px; letter-spacing:0; line-height:1.4; }
  #toast-close { margin-top:12px; background:#FFD700; color:#111; border:none; font-family:'Bebas Neue',cursive; font-size:15px; letter-spacing:2px; padding:6px 20px; border-radius:4px; cursor:pointer; }
</style>
</head>
<body>

<div id="loading">
  <div id="loading-logo">BLOCK<span>BROWSE</span></div>
  <div id="loading-text">STOCKING THE SHELVES...</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-status">Fetching movies...</div>
</div>

<div id="intro" style="display:none">
  <div id="intro-logo">BLOCK<span>BROWSE</span></div>
  <div id="intro-sub">YOUR STREAMING STORE IS OPEN</div>
  <button id="intro-btn" onclick="enterStore()">WALK IN</button>
  <div id="intro-tag">Be kind, rewind.</div>
</div>

<canvas id="canvas"></canvas>

<div id="hud">
  <div id="store-sign">BLOCK<span>BROWSE</span></div>
  <div id="aisle-label"></div>
  <div id="crosshair"></div>
  <div id="movie-card">
    <div id="mc-poster-placeholder">🎬</div>
    <img id="mc-poster" alt="poster" crossorigin="anonymous">
    <div id="mc-body">
      <div id="mc-title">Movie Title</div>
      <div id="mc-meta">Year</div>
      <span id="mc-genre">Genre</span><span id="mc-rating">★ 0.0</span>
      <div id="mc-desc">Description.</div>
      <button id="mc-btn" onclick="rentCurrent()">&#9654; WATCH TONIGHT</button>
    </div>
  </div>
  <div id="controls">
    <div class="ck"><strong>W A S D</strong> Move</div>
    <div class="ck"><strong>Mouse</strong> Look</div>
    <div class="ck"><strong>E</strong> Pick Up</div>
    <div class="ck"><strong>ESC</strong> Unlock</div>
  </div>
  <div id="joystick-zone"><div id="joystick-pad"><div id="joystick-dot"></div></div></div>
  <div id="look-zone"></div>
  <div id="interact-btn" onclick="tryInteract()">E</div>
  <div id="toast">
    <img id="toast-poster" alt="">
    <div id="toast-title">Added!</div>
    <p id="toast-body">In the full app this opens your streaming service.</p>
    <button id="toast-close" onclick="closeToast()">GOT IT</button>
  </div>
</div>

<script>
// ═══ TMDB ══════════════════════════════════════════
const TMDB_KEY  = '03549aee0d249c4c994eaf6f2f579cf2';
const TMDB_BASE = 'https://api.themoviedb.org/3';
const IMG_W     = 'https://image.tmdb.org/t/p/w200';
const IMG_L     = 'https://image.tmdb.org/t/p/w342';

const AISLES = [
  { label:'NEW RELEASES',  listType:'now_playing', genreId:null },
  { label:'ACTION',        listType:'genre',       genreId:28   },
  { label:'COMEDY',        listType:'genre',       genreId:35   },
  { label:'HORROR',        listType:'genre',       genreId:27   },
  { label:'DRAMA',         listType:'genre',       genreId:18   },
  { label:'SCI-FI',        listType:'genre',       genreId:878  },
  { label:'TOP RATED',     listType:'top_rated',   genreId:null },
  { label:'POPULAR',       listType:'popular',     genreId:null },
];

const AISLE_MOVIES = AISLES.map(()=>[]);
const posterImgCache = {};  // url -> HTMLImageElement

async function fetchAisle(aisle, idx) {
  let url;
  if(aisle.listType==='genre')       url=`${TMDB_BASE}/discover/movie?api_key=${TMDB_KEY}&with_genres=${aisle.genreId}&sort_by=popularity.desc&page=1`;
  else if(aisle.listType==='now_playing') url=`${TMDB_BASE}/movie/now_playing?api_key=${TMDB_KEY}&page=1`;
  else if(aisle.listType==='top_rated')   url=`${TMDB_BASE}/movie/top_rated?api_key=${TMDB_KEY}&page=1`;
  else                               url=`${TMDB_BASE}/movie/popular?api_key=${TMDB_KEY}&page=1`;
  try {
    const res  = await fetch(url);
    const data = await res.json();
    AISLE_MOVIES[idx] = (data.results||[]).slice(0,20).map(m=>({
      id:          m.id,
      title:       m.title||'Unknown',
      year:        (m.release_date||'').substring(0,4)||'—',
      genre:       aisle.label,
      rating:      m.vote_average?m.vote_average.toFixed(1):'—',
      desc:        m.overview?(m.overview.substring(0,120)+(m.overview.length>120?'…':'')):' ',
      posterSmall: m.poster_path?(IMG_W+m.poster_path):null,
      posterLarge: m.poster_path?(IMG_L+m.poster_path):null,
    }));
    AISLE_MOVIES[idx].forEach(m=>{
      if(m.posterSmall && !posterImgCache[m.posterSmall]){
        const img=new Image(); img.crossOrigin='anonymous'; img.src=m.posterSmall;
        posterImgCache[m.posterSmall]=img;
      }
    });
  } catch(e){ console.warn('TMDB fetch failed for aisle',idx,e); }
}

// ═══ CANVAS ════════════════════════════════════════
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let W=window.innerWidth, H=window.innerHeight;
canvas.width=W; canvas.height=H;

// ═══ MAP ═══════════════════════════════════════════
// 0=floor 1=wall 2=shelf-L 3=shelf-R 4=counter 5=back-wall
const RAW_MAP=[
  "11111111111111111111",
  "10000000000000000001",
  "10000000000000000001",
  "10044444044444400001",
  "10000000000000000001",
  "10000000000000000001",
  "12222000000000033331",
  "12222000000000033331",
  "10000000000000000001",
  "10000000000000000001",
  "12222000000000033331",
  "12222000000000033331",
  "10000000000000000001",
  "10000000000000000001",
  "12222000000000033331",
  "12222000000000033331",
  "10000000000000000001",
  "10000000000000000001",
  "12222000000000033331",
  "12222000000000033331",
  "10000000000000000001",
  "10000000000000000001",
  "12222000000000033331",
  "12222000000000033331",
  "10000000000000000001",
  "10000000000000000001",
  "15555555555555555551",
  "15555555555555555551",
  "15555555555555555551",
  "11111111111111111111",
];
const MAP_W=20, MAP_H=30;
const MAP=RAW_MAP.map(r=>r.split('').map(Number));
function mapAt(x,y){ const mx=Math.floor(x),my=Math.floor(y); if(mx<0||mx>=MAP_W||my<0||my>=MAP_H)return 1; return MAP[my][mx]; }
function isSolid(x,y){ return mapAt(x,y)!==0; }

// Map row → aisle index
function aisleForPos(row, cell) {
  if(cell===5) return 7; // back wall = popular
  if(row<=7)  return 0;
  if(row<=11) return 1;
  if(row<=15) return 2;
  if(row<=19) return 3;
  if(row<=23) return 4;
  return 5;
}

// Deterministic movie pick: based on which "slot" on the shelf we hit
// wallX (0-1) divided into VHS_PER_ROW slots, 3 shelf rows
const VHS_PER_ROW = 8; // visible boxes per shelf row
function getMovieAtSlot(aisleIdx, shelfRow, slotIdx) {
  const movies = AISLE_MOVIES[aisleIdx];
  if(!movies||!movies.length) return null;
  const i = ((shelfRow * VHS_PER_ROW) + slotIdx) % movies.length;
  return movies[i];
}

// ═══ WALL TEXTURES ═════════════════════════════════
function makeWallTex(){
  const c=document.createElement('canvas'); c.width=64; c.height=64;
  const x=c.getContext('2d');
  x.fillStyle='#0d0d22'; x.fillRect(0,0,64,64);
  x.strokeStyle='rgba(255,255,255,0.05)'; x.lineWidth=1;
  for(let i=0;i<4;i++){
    x.beginPath();x.moveTo(0,i*16);x.lineTo(64,i*16);x.stroke();
    const bx=i%2===0?32:0; x.beginPath();x.moveTo(bx,i*16);x.lineTo(bx,(i+1)*16);x.stroke();
    x.beginPath();x.moveTo(bx+32,i*16);x.lineTo(bx+32,(i+1)*16);x.stroke();
  }
  return c;
}
function makeShelfTex(color){
  const c=document.createElement('canvas'); c.width=64; c.height=64;
  const x=c.getContext('2d');
  // Wood background
  x.fillStyle=color; x.fillRect(0,0,64,64);
  // Shelf board lines (3 shelves divide the height)
  x.fillStyle='rgba(0,0,0,0.5)'; x.fillRect(0,20,64,3); x.fillRect(0,41,64,3);
  // Wood grain
  x.strokeStyle='rgba(0,0,0,0.15)'; x.lineWidth=0.5;
  for(let i=5;i<64;i+=9){ x.beginPath();x.moveTo(i,0);x.lineTo(i,64);x.stroke(); }
  // Shelf front edge highlight
  x.fillStyle='rgba(255,255,255,0.06)'; x.fillRect(0,0,64,2); x.fillRect(0,23,64,2); x.fillRect(0,44,64,2);
  return c;
}
function makeCounterTex(){
  const c=document.createElement('canvas'); c.width=64; c.height=64;
  const x=c.getContext('2d');
  x.fillStyle='#1e1008'; x.fillRect(0,0,64,64);
  x.fillStyle='rgba(255,215,0,0.15)'; x.fillRect(0,0,64,4);
  x.strokeStyle='rgba(255,215,0,0.1)'; x.lineWidth=1;
  x.beginPath();x.moveTo(0,8);x.lineTo(64,8);x.stroke();
  return c;
}
function makeBackWallTex(){
  const c=document.createElement('canvas'); c.width=64; c.height=64;
  const x=c.getContext('2d');
  x.fillStyle='#06061a'; x.fillRect(0,0,64,64);
  // 3 shelf rows
  x.fillStyle='rgba(100,80,30,0.6)'; x.fillRect(0,19,64,4); x.fillRect(0,40,64,4);
  x.fillStyle='rgba(255,255,255,0.04)'; x.fillRect(0,23,64,1); x.fillRect(0,44,64,1);
  return c;
}

const TEX_WALL    = makeWallTex();
const TEX_SHELF_L = makeShelfTex('#3d2a0e');
const TEX_SHELF_R = makeShelfTex('#2a1c08');
const TEX_COUNTER = makeCounterTex();
const TEX_BACKWALL= makeBackWallTex();

function getWallTex(cell){
  if(cell===1)return TEX_WALL; if(cell===2)return TEX_SHELF_L;
  if(cell===3)return TEX_SHELF_R; if(cell===4)return TEX_COUNTER;
  if(cell===5)return TEX_BACKWALL; return TEX_WALL;
}

// ═══ VHS SPRITE RENDERING ══════════════════════════
// Instead of using the raycaster's wallX for texture sampling,
// we post-process each shelf column to draw discrete VHS boxes
// as 2D sprites projected onto the rendered wall strip.

// Returns a canvas with the VHS cover art (poster or fallback)
function makeVHSCanvas(movie, w, h) {
  const c = document.createElement('canvas'); c.width=w; c.height=h;
  const x = c.getContext('2d');

  // Try to draw poster image
  const img = movie.posterSmall ? posterImgCache[movie.posterSmall] : null;
  if(img && img.complete && img.naturalWidth>0){
    x.drawImage(img, 0, 0, w, h);
  } else {
    // Colored fallback
    const hue = (movie.id * 37) % 360;
    x.fillStyle=`hsl(${hue},40%,15%)`; x.fillRect(0,0,w,h);
    const g=x.createLinearGradient(0,0,w,h);
    g.addColorStop(0,'rgba(255,255,255,0.1)');g.addColorStop(1,'rgba(0,0,0,0.4)');
    x.fillStyle=g; x.fillRect(0,0,w,h);
    // Title text
    x.fillStyle='rgba(0,0,0,0.55)'; x.fillRect(0,h*0.72,w,h*0.28);
    x.fillStyle='#FFD700'; x.font=`bold ${Math.max(6,w*0.14)}px Arial`;
    x.textAlign='center'; x.textBaseline='top';
    const words=movie.title.split(' ');
    const half=Math.ceil(words.length/2);
    if(words.length<=2){ x.fillText(movie.title.substring(0,9),w/2,h*0.74); }
    else {
      x.fillText(words.slice(0,half).join(' ').substring(0,9),w/2,h*0.72);
      x.fillText(words.slice(half).join(' ').substring(0,9),w/2,h*0.84);
    }
    if(img) img.onload=()=>{}; // trigger redraw next frame naturally
  }
  // Black border/spine
  x.strokeStyle='rgba(0,0,0,0.8)'; x.lineWidth=1;
  x.strokeRect(0,0,w,h);
  return c;
}

// ═══ RAYCASTER STATE ═══════════════════════════════
// We collect shelf hit info per screen column, then do a second pass to draw VHS boxes
let px=10, py=2.5, pAngle=Math.PI/2;
const FOV=Math.PI/2.6, SPEED=0.065;
function tryMove(dx,dy){ if(!isSolid(px+dx,py))px+=dx; if(!isSolid(px,py+dy))py+=dy; }

// ═══ RENDER ════════════════════════════════════════
const NUM_RAYS = Math.min(W, 600);
let lookedAtMovie = null;

// Per-column shelf hit data for VHS sprite pass
// { screenX, sliceTop, sliceH, aisleIdx, wallX, cell }
const shelfHits = [];

function castAndRender() {
  // Background
  const fg=ctx.createLinearGradient(0,H/2,0,H);
  fg.addColorStop(0,'#1a1240');fg.addColorStop(1,'#0a0820');
  ctx.fillStyle=fg; ctx.fillRect(0,H/2,W,H/2);
  const cg=ctx.createLinearGradient(0,0,0,H/2);
  cg.addColorStop(0,'#c0b8a0');cg.addColorStop(1,'#a0988a');
  ctx.fillStyle=cg; ctx.fillRect(0,0,W,H/2);
  // Ceiling glow
  for(let lx=W*0.15;lx<W*1.1;lx+=W*0.35){
    const lg=ctx.createRadialGradient(lx,0,0,lx,0,H*0.3);
    lg.addColorStop(0,'rgba(255,248,220,0.2)');lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lg; ctx.fillRect(0,0,W,H/2);
  }
  // Carpet stripes
  ctx.fillStyle='rgba(20,10,60,0.45)';
  for(let s=0;s<W;s+=W/10) ctx.fillRect(s,H/2,W/55,H/2);

  shelfHits.length=0;
  lookedAtMovie=null;
  const cRI=Math.floor(NUM_RAYS/2);

  for(let i=0;i<NUM_RAYS;i++){
    const angle=pAngle-FOV/2+(i/NUM_RAYS)*FOV;
    const cos=Math.cos(angle), sin=Math.sin(angle);
    let rx=px,ry=py,dist=0,cell=0;
    while(dist<26){
      rx+=cos*0.018; ry+=sin*0.018; dist+=0.018;
      cell=mapAt(rx,ry); if(cell!==0)break;
    }
    const corrDist=Math.max(0.1,dist*Math.cos(angle-pAngle));
    const sliceH=Math.min(H*2.2,H/corrDist);
    const sliceTop=(H-sliceH)/2;
    const sliceW=Math.ceil(W/NUM_RAYS)+1;
    const screenX=Math.floor(i*W/NUM_RAYS);

    // Wall-x for texture (fractional position along the hit cell face)
    const fx=rx-Math.floor(rx), fy=ry-Math.floor(ry);
    const wallX=(fx<0.025||fx>0.975)?fy:fx;

    // Draw base wall texture
    const tex=getWallTex(cell);
    const texX=Math.floor(wallX*tex.width);
    ctx.drawImage(tex, texX,0,1,tex.height, screenX,sliceTop,sliceW,sliceH);

    // Record shelf hits for second pass
    if(cell===2||cell===3||cell===5){
      const aisleIdx=aisleForPos(Math.floor(ry), cell);
      shelfHits.push({ screenX, sliceW, sliceTop, sliceH, corrDist, aisleIdx, wallX, rx, ry, cell, rayIdx:i });
    }

    // Distance fog
    ctx.fillStyle=`rgba(0,0,10,${Math.min(0.9,corrDist/9)})`;
    ctx.fillRect(screenX,sliceTop,sliceW,sliceH);
  }

  // ── VHS BOX SPRITE PASS ──────────────────────────
  // Group adjacent columns by (aisleIdx, shelfRow, slotIdx) to draw each VHS box once
  // Each box spans a contiguous run of screen columns
  
  // For each shelf hit, compute which VHS slot it belongs to
  // 3 shelf rows per unit height, VHS_PER_ROW boxes across wallX 0..1
  const BOX_ROWS = 3;
  
  // Build runs: key = aisleIdx:row:slot  value = {minX, maxX, sliceTop, sliceH, movie, corrDist}
  const boxRuns = new Map();
  
  for(const hit of shelfHits){
    for(let row=0; row<BOX_ROWS; row++){
      const slotIdx = Math.floor(hit.wallX * VHS_PER_ROW);
      const key = `${hit.aisleIdx}:${row}:${slotIdx}:${Math.floor(hit.rx)}:${Math.floor(hit.ry)}`;
      if(!boxRuns.has(key)){
        const movie = getMovieAtSlot(hit.aisleIdx, row, slotIdx);
        if(movie) boxRuns.set(key, { minX:hit.screenX, maxX:hit.screenX+hit.sliceW, sliceTop:hit.sliceTop, sliceH:hit.sliceH, corrDist:hit.corrDist, movie, row, aisleIdx:hit.aisleIdx, rayIdx:hit.rayIdx });
      } else {
        const run=boxRuns.get(key);
        run.minX=Math.min(run.minX,hit.screenX);
        run.maxX=Math.max(run.maxX,hit.screenX+hit.sliceW);
        if(hit.sliceH>run.sliceH){ run.sliceTop=hit.sliceTop; run.sliceH=hit.sliceH; run.corrDist=hit.corrDist; }
      }
    }
  }

  // Draw VHS boxes
  for(const [,run] of boxRuns){
    const { minX, maxX, sliceTop, sliceH, movie, row, corrDist } = run;
    const boxW = maxX - minX;
    if(boxW < 2) continue;

    // Shelf row positions: 3 rows stacked vertically
    // Top shelf ~15% from top of wall, middle ~45%, bottom ~72%
    const rowOffsets = [0.12, 0.42, 0.70];
    const rowHeights = [0.26, 0.26, 0.26]; // fraction of wall height

    const ro = rowOffsets[row];
    const rh = rowHeights[row];
    const vhsTop  = sliceTop + sliceH * ro;
    const vhsH    = sliceH * rh;
    const vhsW    = boxW;

    if(vhsH < 4 || vhsW < 2) continue;

    // Draw the VHS cover
    const vhsCanvas = makeVHSCanvas(movie, Math.max(1,Math.ceil(vhsW)), Math.max(1,Math.ceil(vhsH)));
    ctx.drawImage(vhsCanvas, minX, vhsTop, vhsW, vhsH);

    // Thin dark gap between boxes (spine separator)
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(minX, vhsTop, 1, vhsH);
    ctx.fillRect(maxX-1, vhsTop, 1, vhsH);

    // Shelf board below each row
    ctx.fillStyle='rgba(80,55,20,0.9)';
    ctx.fillRect(minX, vhsTop+vhsH, vhsW, Math.max(2, sliceH*0.035));

    // Distance fog on VHS
    ctx.fillStyle=`rgba(0,0,10,${Math.min(0.85,corrDist/10)})`;
    ctx.fillRect(minX, vhsTop, vhsW, vhsH+sliceH*0.035);
  }

  // Ceiling light fixtures
  ctx.fillStyle='rgba(255,248,220,0.92)';
  for(let lx=W*0.15;lx<W*1.1;lx+=W*0.35) ctx.fillRect(lx-W*0.07,1,W*0.14,4);

  // ── CENTER RAY: detect what we're looking at ─────
  // Find the closest shelf hit near center
  let closestShelf=null, closestDist=Infinity;
  for(const hit of shelfHits){
    const mid=Math.floor(NUM_RAYS/2);
    if(Math.abs(hit.rayIdx-mid)<4 && hit.corrDist<3.5 && hit.corrDist<closestDist){
      closestDist=hit.corrDist; closestShelf=hit;
    }
  }
  if(closestShelf){
    // Figure out which shelf row based on vertical screen position
    const my=H/2, wallMid=closestShelf.sliceTop+closestShelf.sliceH/2;
    const fracFromTop=(my-closestShelf.sliceTop)/closestShelf.sliceH;
    const row=fracFromTop<0.38?0:fracFromTop<0.65?1:2;
    const slotIdx=Math.floor(closestShelf.wallX*VHS_PER_ROW);
    lookedAtMovie=getMovieAtSlot(closestShelf.aisleIdx, row, slotIdx);
  }
}

// ═══ MINIMAP ═══════════════════════════════════════
function drawMinimap(){
  const ms=4, mw=MAP_W*ms, mh=MAP_H*ms;
  const ox=W-mw-10, oy=H-mh-10;
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(ox-1,oy-1,mw+2,mh+2);
  for(let my=0;my<MAP_H;my++) for(let mx=0;mx<MAP_W;mx++){
    const c=MAP[my][mx];
    ctx.fillStyle=c===0?'#18103a':c===1?'#444':c===2||c===3?'#7a5c1e':c===4?'#3a1a08':'#0d1044';
    ctx.fillRect(ox+mx*ms,oy+my*ms,ms-1,ms-1);
  }
  ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.arc(ox+px*ms,oy+py*ms,2.5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(ox+px*ms,oy+py*ms); ctx.lineTo(ox+px*ms+Math.cos(pAngle)*7,oy+py*ms+Math.sin(pAngle)*7); ctx.stroke();
}

// ═══ MOVIE CARD ════════════════════════════════════
const movieCard=document.getElementById('movie-card');
let lastMovie=null;
function updateMovieCard(){
  if(lookedAtMovie&&lookedAtMovie!==lastMovie){
    lastMovie=lookedAtMovie;
    document.getElementById('mc-title').textContent=lookedAtMovie.title;
    document.getElementById('mc-meta').textContent=lookedAtMovie.year;
    document.getElementById('mc-genre').textContent=lookedAtMovie.genre;
    document.getElementById('mc-rating').textContent='★ '+lookedAtMovie.rating;
    document.getElementById('mc-desc').textContent=lookedAtMovie.desc;
    const ph=document.getElementById('mc-poster-placeholder');
    const pi=document.getElementById('mc-poster');
    if(lookedAtMovie.posterLarge){ pi.src=lookedAtMovie.posterLarge; pi.style.display='block'; ph.style.display='none'; }
    else { pi.style.display='none'; ph.style.display='flex'; ph.textContent='🎬'; }
    movieCard.classList.add('show');
    if(isMobile) document.getElementById('interact-btn').style.display='flex';
  } else if(!lookedAtMovie){
    lastMovie=null; movieCard.classList.remove('show');
    if(isMobile) document.getElementById('interact-btn').style.display='none';
  }
}

// ═══ AISLE LABEL ═══════════════════════════════════
const aisleEl=document.getElementById('aisle-label');
let lastAisle='',aisleTimer=null;
function updateAisle(){
  const emojis=['🎬','💥','😂','👻','🎭','🚀','🏆','⭐'];
  const ai=py<4?-1:py<6?-2:py<9?0:py<13?1:py<17?2:py<21?3:py<25?4:py<26?5:7;
  const label=ai===-1?'ENTRANCE':ai===-2?'CHECKOUT':AISLES[ai]?(emojis[ai]+' '+AISLES[ai].label):'';
  if(label!==lastAisle){
    lastAisle=label; aisleEl.textContent=label;
    aisleEl.classList.add('show'); clearTimeout(aisleTimer);
    aisleTimer=setTimeout(()=>aisleEl.classList.remove('show'),2200);
  }
}

// ═══ INTERACT ══════════════════════════════════════
function tryInteract(){ if(lookedAtMovie) rentCurrent(); }
function rentCurrent(){
  const m=lookedAtMovie; if(!m)return;
  document.getElementById('toast-title').textContent='🎬 '+m.title;
  document.getElementById('toast-body').textContent='Added to your queue! In the full app, this would open your streaming service.';
  const tp=document.getElementById('toast-poster');
  if(m.posterLarge){tp.src=m.posterLarge;tp.style.display='block';}else tp.style.display='none';
  document.getElementById('toast').style.display='block';
  if(pointerLocked) document.exitPointerLock();
}
function closeToast(){ document.getElementById('toast').style.display='none'; }

// ═══ INPUT ═════════════════════════════════════════
const keys={};
document.addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true; if(e.key==='e'||e.key==='E')tryInteract(); });
document.addEventListener('keyup',  e=>keys[e.key.toLowerCase()]=false);
let pointerLocked=false;
canvas.addEventListener('click',()=>{ if(!document.getElementById('intro').classList.contains('out'))return; canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange',()=>{ pointerLocked=document.pointerLockElement===canvas; });
document.addEventListener('mousemove',e=>{ if(pointerLocked)pAngle+=e.movementX*0.002; });

const isMobile='ontouchstart' in window;
if(isMobile){ document.getElementById('joystick-zone').style.display='block'; document.getElementById('look-zone').style.display='block'; document.getElementById('controls').style.display='none'; }
let joyActive=false,joyX=0,joyY=0;
const joyZone=document.getElementById('joystick-zone'), joyDot=document.getElementById('joystick-dot');
joyZone.addEventListener('touchstart',e=>{joyActive=true;e.preventDefault();},{passive:false});
joyZone.addEventListener('touchend',()=>{joyActive=false;joyX=0;joyY=0;joyDot.style.transform='translate(-50%,-50%)';});
joyZone.addEventListener('touchmove',e=>{
  if(!joyActive)return;e.preventDefault();
  const t=e.touches[0],r=joyZone.getBoundingClientRect();
  let dx=t.clientX-(r.left+r.width/2),dy=t.clientY-(r.top+r.height*0.65);
  const dist=Math.sqrt(dx*dx+dy*dy),maxR=32;
  if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR;}
  joyX=dx/maxR;joyY=dy/maxR;
  joyDot.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
},{passive:false});
let lookLastX=0,lookActive=false;
const lookZone=document.getElementById('look-zone');
lookZone.addEventListener('touchstart',e=>{lookActive=true;lookLastX=e.touches[0].clientX;e.preventDefault();},{passive:false});
lookZone.addEventListener('touchend',()=>lookActive=false);
lookZone.addEventListener('touchmove',e=>{
  if(!lookActive)return;e.preventDefault();
  pAngle+=(e.touches[0].clientX-lookLastX)*0.005; lookLastX=e.touches[0].clientX;
},{passive:false});

// ═══ GAME LOOP ══════════════════════════════════════
let started=false;
function loop(){
  requestAnimationFrame(loop);
  if(!started)return;
  const rot=0.032;
  if(keys['w']||keys['arrowup'])    tryMove(Math.cos(pAngle)*SPEED,  Math.sin(pAngle)*SPEED);
  if(keys['s']||keys['arrowdown'])  tryMove(-Math.cos(pAngle)*SPEED,-Math.sin(pAngle)*SPEED);
  if(keys['a']||keys['arrowleft'])  pAngle-=rot;
  if(keys['d']||keys['arrowright']) pAngle+=rot;
  if(joyActive){ tryMove(Math.cos(pAngle)*(-joyY)*SPEED*1.3,Math.sin(pAngle)*(-joyY)*SPEED*1.3); pAngle+=joyX*0.04; }
  castAndRender();
  drawMinimap();
  updateMovieCard();
  updateAisle();
}
requestAnimationFrame(loop);

function enterStore(){
  document.getElementById('intro').classList.add('out');
  setTimeout(()=>{ document.getElementById('intro').style.display='none'; started=true; },700);
  if(!isMobile) canvas.requestPointerLock();
}
window.addEventListener('resize',()=>{ W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H; });

// ═══ INIT ══════════════════════════════════════════
async function init(){
  const bar=document.getElementById('loading-bar');
  const status=document.getElementById('loading-status');
  for(let i=0;i<AISLES.length;i++){
    status.textContent=`Loading ${AISLES[i].label}...`;
    await fetchAisle(AISLES[i],i);
    bar.style.width=`${Math.round((i+1)/AISLES.length*100)}%`;
  }
  status.textContent='Ready!';
  await new Promise(r=>setTimeout(r,400));
  const loading=document.getElementById('loading');
  loading.classList.add('out');
  setTimeout(()=>{ loading.style.display='none'; document.getElementById('intro').style.display='flex'; },600);
}
init();
</script>
