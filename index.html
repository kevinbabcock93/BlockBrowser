<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BlockBrowser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=VT323&family=Barlow:wght@400;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; width:100vw; height:100vh; font-family:'Barlow',sans-serif; touch-action:none; }
  #canvas { display:block; width:100vw; height:100vh; image-rendering:pixelated; }
  #hud { position:fixed; inset:0; pointer-events:none; z-index:10; }
  #store-sign {
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    background:#FFD700; color:#1a1a1a; font-family:'Bebas Neue',cursive;
    font-size:24px; letter-spacing:4px; padding:5px 24px 3px; border-radius:2px;
    box-shadow:0 0 24px rgba(255,215,0,0.7); border:3px solid #b8860b; white-space:nowrap;
  }
  #store-sign span { color:#1565C0; }
  #crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:18px; height:18px; }
  #crosshair::before,#crosshair::after { content:''; position:absolute; background:rgba(255,255,255,0.85); }
  #crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
  #crosshair::after  { height:2px; width:100%; top:50%; transform:translateY(-50%); }
  #aisle-label {
    position:absolute; top:62px; left:50%; transform:translateX(-50%);
    font-family:'VT323',monospace; font-size:22px; color:#FFD700;
    letter-spacing:3px; text-shadow:0 0 8px rgba(255,215,0,0.7);
    opacity:0; transition:opacity 0.35s; white-space:nowrap;
  }
  #aisle-label.show { opacity:1; }

  /* Loading */
  #loading { position:fixed; inset:0; background:#000; z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 0.6s; }
  #loading.out { opacity:0; pointer-events:none; }
  #loading-logo { font-family:'Bebas Neue',cursive; font-size:clamp(40px,10vw,68px); letter-spacing:6px; color:#FFD700; text-shadow:0 0 30px rgba(255,215,0,0.4); margin-bottom:6px; }
  #loading-logo span { color:#1565C0; }
  #loading-sub { font-family:'VT323',monospace; font-size:15px; color:rgba(255,255,255,0.45); letter-spacing:3px; margin-bottom:26px; }
  #loading-bar-wrap { width:220px; height:5px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
  #loading-bar { height:100%; width:0%; background:#FFD700; border-radius:3px; transition:width 0.25s; box-shadow:0 0 8px rgba(255,215,0,0.6); }
  #loading-status { font-size:10px; color:rgba(255,255,255,0.3); margin-top:10px; letter-spacing:1px; }

  /* Movie card */
  #movie-card { position:absolute; right:14px; top:50%; transform:translateY(-50%); width:190px; background:rgba(6,6,18,0.97); border:1px solid rgba(255,215,0,0.55); border-radius:8px; overflow:hidden; opacity:0; transition:opacity 0.2s; pointer-events:all; }
  #movie-card.show { opacity:1; }
  #mc-poster { width:100%; height:115px; object-fit:cover; display:none; }
  #mc-ph { width:100%; height:115px; display:flex; align-items:center; justify-content:center; font-size:42px; background:#0d0d1a; }
  #mc-body { padding:9px; }
  #mc-title { font-family:'Bebas Neue',cursive; font-size:16px; color:#FFD700; line-height:1.1; margin-bottom:2px; }
  #mc-meta  { font-size:10px; color:rgba(255,255,255,0.4); margin-bottom:4px; }
  #mc-tags  { margin-bottom:6px; }
  #mc-genre { display:inline-block; background:#1565C0; color:#fff; font-size:8px; padding:2px 6px; border-radius:3px; letter-spacing:1px; text-transform:uppercase; }
  #mc-rating{ display:inline-block; background:#b8960a; color:#000; font-size:8px; padding:2px 6px; border-radius:3px; letter-spacing:1px; margin-left:3px; font-weight:700; }
  #mc-desc  { font-size:10px; color:rgba(255,255,255,0.68); line-height:1.4; margin-bottom:8px; }
  #mc-btn   { width:100%; background:#FFD700; color:#111; border:none; font-family:'Bebas Neue',cursive; font-size:15px; letter-spacing:2px; padding:6px; border-radius:4px; cursor:pointer; pointer-events:all; }
  #mc-btn:hover { background:#ffe84d; }

  #controls { position:absolute; bottom:18px; left:50%; transform:translateX(-50%); display:flex; gap:7px; }
  .ck { background:rgba(0,0,0,0.78); border:1px solid rgba(255,255,255,0.15); border-radius:6px; padding:4px 11px; font-size:10px; color:rgba(255,255,255,0.6); letter-spacing:1px; white-space:nowrap; }
  .ck strong { color:#FFD700; font-family:'VT323',monospace; font-size:13px; }

  /* Mobile */
  #joy-zone  { position:absolute; left:0; bottom:0; width:50%; height:44%; pointer-events:all; display:none; }
  #look-zone { position:absolute; right:0; bottom:0; width:50%; height:44%; pointer-events:all; display:none; }
  #joy-pad   { position:absolute; bottom:28px; left:50%; transform:translateX(-50%); width:76px; height:76px; border-radius:50%; border:2px solid rgba(255,215,0,0.35); background:rgba(255,215,0,0.07); }
  #joy-dot   { position:absolute; width:26px; height:26px; border-radius:50%; background:rgba(255,215,0,0.55); top:50%; left:50%; transform:translate(-50%,-50%); }
  #e-btn     { position:absolute; right:18px; bottom:76px; width:56px; height:56px; border-radius:50%; background:rgba(255,215,0,0.12); border:2px solid rgba(255,215,0,0.45); color:#FFD700; font-family:'Bebas Neue',cursive; font-size:20px; display:none; align-items:center; justify-content:center; pointer-events:all; cursor:pointer; }

  /* Intro */
  #intro { position:fixed; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; transition:opacity 0.7s; }
  #intro.out { opacity:0; pointer-events:none; }
  #intro-logo { font-family:'Bebas Neue',cursive; font-size:clamp(46px,11vw,78px); letter-spacing:6px; color:#FFD700; text-shadow:0 0 40px rgba(255,215,0,0.45); margin-bottom:4px; }
  #intro-logo span { color:#1565C0; }
  #intro-sub { font-family:'VT323',monospace; font-size:17px; color:rgba(255,255,255,0.5); letter-spacing:4px; margin-bottom:42px; }
  #intro-btn { background:#FFD700; color:#111; border:none; font-family:'Bebas Neue',cursive; font-size:23px; letter-spacing:4px; padding:12px 42px; border-radius:4px; cursor:pointer; box-shadow:0 0 28px rgba(255,215,0,0.3); }
  #intro-tag { font-size:11px; color:rgba(255,255,255,0.28); margin-top:16px; letter-spacing:2px; }

  /* Toast */
  #toast { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.93); border:1px solid #FFD700; border-radius:10px; padding:18px 22px; text-align:center; font-family:'Bebas Neue',cursive; font-size:19px; color:#FFD700; letter-spacing:2px; width:260px; display:none; pointer-events:all; z-index:50; }
  #toast-poster { width:75px; height:105px; object-fit:cover; border-radius:3px; margin:0 auto 8px; display:block; background:#1a1a1a; }
  #toast p { font-family:'Barlow',sans-serif; font-size:11px; color:rgba(255,255,255,0.68); margin-top:5px; letter-spacing:0; line-height:1.4; }
  #toast-close { margin-top:11px; background:#FFD700; color:#111; border:none; font-family:'Bebas Neue',cursive; font-size:14px; letter-spacing:2px; padding:5px 18px; border-radius:4px; cursor:pointer; }
</style>
</head>
<body>

<div id="loading">
  <div id="loading-logo">BLOCK<span>BROWSER</span></div>
  <div id="loading-sub">STOCKING THE SHELVES...</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-status">Fetching movies...</div>
</div>

<div id="intro" style="display:none">
  <div id="intro-logo">BLOCK<span>BROWSER</span></div>
  <div id="intro-sub">YOUR STREAMING STORE IS OPEN</div>
  <button id="intro-btn" onclick="enterStore()">WALK IN</button>
  <div id="intro-tag">Be kind, rewind.</div>
</div>

<canvas id="canvas"></canvas>

<div id="hud">
  <div id="store-sign">BLOCK<span>BROWSER</span></div>
  <div id="aisle-label"></div>
  <div id="crosshair"></div>
  <div id="movie-card">
    <div id="mc-ph">🎬</div>
    <img id="mc-poster" alt="poster" crossorigin="anonymous">
    <div id="mc-body">
      <div id="mc-title">Movie Title</div>
      <div id="mc-meta">Year</div>
      <div id="mc-tags"><span id="mc-genre">Genre</span><span id="mc-rating">★ 0.0</span></div>
      <div id="mc-desc">Description.</div>
      <button id="mc-btn" onclick="rentCurrent()">&#9654; WATCH TONIGHT</button>
    </div>
  </div>
  <div id="controls">
    <div class="ck"><strong>W A S D</strong> Move</div>
    <div class="ck"><strong>Mouse</strong> Look</div>
    <div class="ck"><strong>E</strong> Pick Up</div>
    <div class="ck"><strong>ESC</strong> Unlock</div>
  </div>
  <div id="joy-zone"><div id="joy-pad"><div id="joy-dot"></div></div></div>
  <div id="look-zone"></div>
  <div id="e-btn" onclick="tryInteract()">E</div>
  <div id="toast">
    <img id="toast-poster" alt="">
    <div id="toast-title">Added!</div>
    <p id="toast-body">In the full app this opens your streaming service.</p>
    <button id="toast-close" onclick="closeToast()">GOT IT</button>
  </div>
</div>

<script>
// ═══ TMDB ══════════════════════════════════════════════════════
const TMDB_KEY  = '03549aee0d249c4c994eaf6f2f579cf2';
const TMDB_BASE = 'https://api.themoviedb.org/3';
const IMG_SM    = 'https://image.tmdb.org/t/p/w154';
const IMG_LG    = 'https://image.tmdb.org/t/p/w342';

const AISLES = [
  { label:'NEW RELEASES', listType:'now_playing', genreId:null  },
  { label:'ACTION',       listType:'genre',       genreId:28    },
  { label:'COMEDY',       listType:'genre',       genreId:35    },
  { label:'HORROR',       listType:'genre',       genreId:27    },
  { label:'DRAMA',        listType:'genre',       genreId:18    },
  { label:'SCI-FI',       listType:'genre',       genreId:878   },
  { label:'TOP RATED',    listType:'top_rated',   genreId:null  },
  { label:'POPULAR',      listType:'popular',     genreId:null  },
];
const AISLE_MOVIES = AISLES.map(()=>[]);
const posterCache  = {}; // url -> HTMLImageElement

async function fetchAisle(aisle, idx) {
  let url;
  if(aisle.listType==='genre')        url=`${TMDB_BASE}/discover/movie?api_key=${TMDB_KEY}&with_genres=${aisle.genreId}&sort_by=popularity.desc&page=1`;
  else if(aisle.listType==='now_playing') url=`${TMDB_BASE}/movie/now_playing?api_key=${TMDB_KEY}&page=1`;
  else if(aisle.listType==='top_rated')   url=`${TMDB_BASE}/movie/top_rated?api_key=${TMDB_KEY}&page=1`;
  else                                url=`${TMDB_BASE}/movie/popular?api_key=${TMDB_KEY}&page=1`;
  try {
    const d = await (await fetch(url)).json();
    AISLE_MOVIES[idx] = (d.results||[]).slice(0,20).map(m=>({
      id:     m.id,
      title:  m.title||'Unknown',
      year:   (m.release_date||'').slice(0,4)||'—',
      genre:  aisle.label,
      rating: m.vote_average?m.vote_average.toFixed(1):'—',
      desc:   m.overview?(m.overview.slice(0,115)+(m.overview.length>115?'…':'')):' ',
      imgSm:  m.poster_path?(IMG_SM+m.poster_path):null,
      imgLg:  m.poster_path?(IMG_LG+m.poster_path):null,
    }));
    AISLE_MOVIES[idx].forEach(m=>{ if(m.imgSm&&!posterCache[m.imgSm]){ const i=new Image();i.crossOrigin='anonymous';i.src=m.imgSm;posterCache[m.imgSm]=i; } });
  } catch(e){ console.warn('TMDB fail aisle',idx,e); }
}

// ═══ CANVAS ════════════════════════════════════════════════════
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let W=window.innerWidth, H=window.innerHeight;
canvas.width=W; canvas.height=H;

// ═══ MAP  (tighter — 16 wide x 24 deep) ════════════════════════
// 0=floor 1=wall 2=shelf-face(player faces +x or -x) 3=shelf-back 4=counter 5=backwall-shelves
// Aisle width = 3 cells, shelf thickness = 1 cell
// Layout: entrance → checkout → 5 double-sided aisle pairs → back wall
const RAW = [
  "1111111111111111",
  "1000000000000001",
  "1000000000000001",
  "1003333333300001", // checkout
  "1000000000000001",
  "1222200000022221", // aisle 1 (New Releases)
  "1222200000022221",
  "1000000000000001",
  "1222200000022221", // aisle 2 (Action)
  "1222200000022221",
  "1000000000000001",
  "1222200000022221", // aisle 3 (Comedy)
  "1222200000022221",
  "1000000000000001",
  "1222200000022221", // aisle 4 (Horror)
  "1222200000022221",
  "1000000000000001",
  "1222200000022221", // aisle 5 (Drama)
  "1222200000022221",
  "1000000000000001",
  "1555555555555551", // back wall
  "1555555555555551",
  "1555555555555551",
  "1111111111111111",
];
const MAP_W=16, MAP_H=24;
const MAP=RAW.map(r=>r.split('').map(Number));
function mapAt(x,y){ const mx=Math.floor(x),my=Math.floor(y); if(mx<0||mx>=MAP_W||my<0||my>=MAP_H)return 1; return MAP[my][mx]; }
function isSolid(x,y){ return mapAt(x,y)!==0; }

// Row → aisle index mapping
function aisleForRow(row, cell){
  if(cell===5) return 7; // popular (back wall)
  if(row<=6)  return 0;  // New Releases
  if(row<=8)  return 1;  // Action
  if(row<=10) return 2;  // Comedy  (wait — let's be more precise)
  if(row<=12) return 3;  // Horror
  if(row<=14) return 4;  // Drama
  if(row<=16) return 5;  // Sci-Fi (aisle 4 repurposed)
  return 6;              // Top Rated
}

// ═══ TEXTURES ══════════════════════════════════════════════════
function mkTex(fn){ const c=document.createElement('canvas');c.width=64;c.height=64;fn(c.getContext('2d'),c);return c; }

const TEX_WALL = mkTex((x)=>{
  x.fillStyle='#e8b800'; x.fillRect(0,0,64,64); // Blockbuster YELLOW walls!
  x.strokeStyle='rgba(0,0,0,0.08)'; x.lineWidth=1;
  for(let i=0;i<4;i++){ x.beginPath();x.moveTo(0,i*16);x.lineTo(64,i*16);x.stroke(); }
});

const TEX_SHELF = mkTex((x)=>{
  // Shelf face — medium wood color, with 5 shelf boards dividing it
  x.fillStyle='#5a3e1e'; x.fillRect(0,0,64,64);
  // 5 shelf dividers (horizontal boards)
  const boards=[11,23,35,47,59];
  boards.forEach(y=>{ x.fillStyle='rgba(0,0,0,0.55)'; x.fillRect(0,y,64,3); x.fillStyle='rgba(255,255,255,0.07)'; x.fillRect(0,y+3,64,1); });
  // Wood grain
  x.strokeStyle='rgba(0,0,0,0.1)'; x.lineWidth=0.5;
  for(let i=6;i<64;i+=8){ x.beginPath();x.moveTo(i,0);x.lineTo(i,64);x.stroke(); }
});

const TEX_COUNTER = mkTex((x)=>{
  x.fillStyle='#2a1a08'; x.fillRect(0,0,64,64);
  x.fillStyle='rgba(255,215,0,0.2)'; x.fillRect(0,0,64,5);
  x.strokeStyle='rgba(255,215,0,0.12)'; x.lineWidth=1;
  x.beginPath();x.moveTo(0,10);x.lineTo(64,10);x.stroke();
});

const TEX_BACKWALL = mkTex((x)=>{
  x.fillStyle='#1a1050'; x.fillRect(0,0,64,64);
  // 5 shelf boards
  [11,23,35,47,59].forEach(y=>{ x.fillStyle='rgba(90,62,20,0.8)'; x.fillRect(0,y,64,3); x.fillStyle='rgba(255,255,255,0.05)'; x.fillRect(0,y+3,64,1); });
});

function getWallTex(cell){
  if(cell===1)return TEX_WALL; if(cell===2||cell===3)return TEX_SHELF;
  if(cell===4)return TEX_COUNTER; if(cell===5)return TEX_BACKWALL;
  return TEX_WALL;
}

// ═══ VHS CANVAS CACHE ══════════════════════════════════════════
// Key: movieId + size → offscreen canvas
// Rebuilt only when poster image loads
const vhsCanvasCache = new Map();
let   vhsCacheVersion = 0; // bump when new images load

function getVHSCanvas(movie, w, h) {
  const key = `${movie.id}_${w}_${h}`;
  // Check if poster has loaded since last cache
  const img = movie.imgSm ? posterCache[movie.imgSm] : null;
  const loaded = img && img.complete && img.naturalWidth > 0;
  const cacheKey = key + (loaded ? '_L' : '_F');

  if(vhsCanvasCache.has(cacheKey)) return vhsCanvasCache.get(cacheKey);

  const c = document.createElement('canvas'); c.width=w; c.height=h;
  const x = c.getContext('2d');

  if(loaded){
    x.drawImage(img,0,0,w,h);
    // subtle top sheen
    const g=x.createLinearGradient(0,0,0,h*0.3);
    g.addColorStop(0,'rgba(255,255,255,0.12)');g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g; x.fillRect(0,0,w,h);
  } else {
    // Colored fallback with title
    const hue=(movie.id*47)%360;
    x.fillStyle=`hsl(${hue},35%,14%)`; x.fillRect(0,0,w,h);
    const g=x.createLinearGradient(0,0,w,h);
    g.addColorStop(0,'rgba(255,255,255,0.1)');g.addColorStop(1,'rgba(0,0,0,0.35)');
    x.fillStyle=g; x.fillRect(0,0,w,h);
    x.fillStyle='rgba(0,0,0,0.5)'; x.fillRect(0,h*0.7,w,h*0.3);
    x.fillStyle='#FFD700'; x.font=`bold ${Math.max(5,w*0.13)}px Arial`;
    x.textAlign='center'; x.textBaseline='top';
    const words=movie.title.split(' '), half=Math.ceil(words.length/2);
    if(words.length<=2) x.fillText(movie.title.slice(0,9),w/2,h*0.72);
    else{ x.fillText(words.slice(0,half).join(' ').slice(0,9),w/2,h*0.70); x.fillText(words.slice(half).join(' ').slice(0,9),w/2,h*0.83); }
    // When image loads, invalidate cache
    if(img) img.onload=()=>{ vhsCanvasCache.delete(key+'_F'); };
  }
  // Black border
  x.strokeStyle='rgba(0,0,0,0.9)'; x.lineWidth=1; x.strokeRect(0.5,0.5,w-1,h-1);

  vhsCanvasCache.set(cacheKey, c);
  // Limit cache size
  if(vhsCanvasCache.size > 800){ const first=vhsCanvasCache.keys().next().value; vhsCanvasCache.delete(first); }
  return c;
}

// ═══ SHELF SLOT → MOVIE ════════════════════════════════════════
// 5 shelf rows, 10 boxes per row
const ROWS_PER_SHELF = 5;
const BOXES_PER_ROW  = 10;

function getMovieAt(aisleIdx, row, slot){
  const movies=AISLE_MOVIES[aisleIdx];
  if(!movies||!movies.length)return null;
  return movies[((row*BOXES_PER_ROW)+slot)%movies.length];
}

// ═══ PLAYER ════════════════════════════════════════════════════
let px=8, py=1.8, pAngle=Math.PI/2;
const FOV=Math.PI/2.4, SPEED=0.055;
function tryMove(dx,dy){ if(!isSolid(px+dx,py))px+=dx; if(!isSolid(px,py+dy))py+=dy; }

// ═══ RENDER ════════════════════════════════════════════════════
const NUM_RAYS = Math.min(W, 480); // cap rays for perf
let lookedAtMovie = null;

// Shelf hit collection for sprite pass
const shelfHits = [];

function castAndRender(){
  // ── Floor (blue carpet!) ──
  const fg=ctx.createLinearGradient(0,H/2,0,H);
  fg.addColorStop(0,'#1a4a8a'); fg.addColorStop(1,'#0d2a55');
  ctx.fillStyle=fg; ctx.fillRect(0,H/2,W,H/2);
  // Carpet texture lines
  ctx.strokeStyle='rgba(10,30,80,0.5)'; ctx.lineWidth=1;
  for(let y=H/2+4;y<H;y+=8){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

  // ── Ceiling (off-white) ──
  const cg=ctx.createLinearGradient(0,0,0,H/2);
  cg.addColorStop(0,'#f5f0e0'); cg.addColorStop(1,'#e0d8c0');
  ctx.fillStyle=cg; ctx.fillRect(0,0,W,H/2);
  // Ceiling lights bloom
  for(let lx=W*0.1;lx<W*1.05;lx+=W*0.3){
    const lg=ctx.createRadialGradient(lx,0,0,lx,0,H*0.32);
    lg.addColorStop(0,'rgba(255,252,230,0.3)'); lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lg; ctx.fillRect(0,0,W,H/2);
  }

  shelfHits.length=0;
  lookedAtMovie=null;

  for(let i=0;i<NUM_RAYS;i++){
    const angle=pAngle-FOV/2+(i/NUM_RAYS)*FOV;
    const cos=Math.cos(angle),sin=Math.sin(angle);
    let rx=px,ry=py,dist=0,cell=0;
    while(dist<20){
      rx+=cos*0.016; ry+=sin*0.016; dist+=0.016;
      cell=mapAt(rx,ry); if(cell!==0)break;
    }
    const corrDist=Math.max(0.1,dist*Math.cos(angle-pAngle));
    const sliceH=Math.min(H*2.5,H/corrDist);
    const sliceTop=(H-sliceH)/2;
    const sliceW=Math.ceil(W/NUM_RAYS)+1;
    const screenX=Math.floor(i*W/NUM_RAYS);
    const fx=rx-Math.floor(rx),fy=ry-Math.floor(ry);
    const wallX=(fx<0.025||fx>0.975)?fy:fx;

    // Base wall texture
    const tex=getWallTex(cell);
    ctx.drawImage(tex,Math.floor(wallX*tex.width),0,1,tex.height,screenX,sliceTop,sliceW,sliceH);

    // Record shelf columns for second pass
    if(cell===2||cell===3||cell===5){
      shelfHits.push({ screenX, sliceW, sliceTop, sliceH, corrDist,
        aisleIdx:aisleForRow(Math.floor(ry),cell), wallX, rx, ry, cell, i });
    }

    // Distance fog
    const fog=Math.min(0.88,corrDist/7);
    ctx.fillStyle=`rgba(0,0,0,${fog})`; ctx.fillRect(screenX,sliceTop,sliceW,sliceH);
  }

  // ── VHS SPRITE PASS ─────────────────────────────────────────
  // Group columns into discrete box runs
  // wallX 0..1 → BOXES_PER_ROW slots; 5 vertical rows
  const runs = new Map();

  for(const h of shelfHits){
    const slot = Math.min(BOXES_PER_ROW-1, Math.floor(h.wallX * BOXES_PER_ROW));
    const mapKey = `${h.aisleIdx}:${Math.floor(h.rx)}:${Math.floor(h.ry)}:${slot}`;
    if(!runs.has(mapKey)){
      runs.set(mapKey,{ minX:h.screenX, maxX:h.screenX+h.sliceW, sliceTop:h.sliceTop, sliceH:h.sliceH, corrDist:h.corrDist, aisleIdx:h.aisleIdx, slot, i:h.i });
    } else {
      const r=runs.get(mapKey);
      r.minX=Math.min(r.minX,h.screenX);
      r.maxX=Math.max(r.maxX,h.screenX+h.sliceW);
      if(h.sliceH>r.sliceH){r.sliceTop=h.sliceTop;r.sliceH=h.sliceH;r.corrDist=h.corrDist;}
    }
  }

  // 5 shelf rows — vertical positions as fraction of wall height
  // Matches the 5 shelf boards in TEX_SHELF
  const ROW_TOPS  = [0.02, 0.21, 0.39, 0.58, 0.76]; // top of each VHS box
  const ROW_HT    = 0.18; // height of each box as fraction of wall height

  const centerRay = Math.floor(NUM_RAYS/2);
  let   closestHit = null, closestD = Infinity;

  for(const [,r] of runs){
    const bw = r.maxX - r.minX;
    if(bw < 1) continue;

    for(let row=0; row<ROWS_PER_SHELF; row++){
      const movie = getMovieAt(r.aisleIdx, row, r.slot);
      if(!movie) continue;

      const vTop = r.sliceTop + r.sliceH * ROW_TOPS[row];
      const vH   = Math.max(3, r.sliceH * ROW_HT);
      const vW   = Math.max(2, bw);

      // Draw cached VHS sprite
      const sprite = getVHSCanvas(movie, Math.ceil(vW), Math.ceil(vH));
      ctx.drawImage(sprite, r.minX, vTop, vW, vH);

      // Thin shelf board below box
      ctx.fillStyle='rgba(50,32,8,0.95)';
      ctx.fillRect(r.minX, vTop+vH, vW, Math.max(2, r.sliceH*0.022));

      // Distance fog on boxes
      const fog=Math.min(0.82, r.corrDist/7.5);
      ctx.fillStyle=`rgba(0,0,0,${fog})`;
      ctx.fillRect(r.minX, vTop, vW, vH+r.sliceH*0.022);

      // Check if center crosshair is on this box
      if(r.corrDist < 3.0 && r.corrDist < closestD){
        const midScreen = r.minX + vW/2;
        const cScreen   = Math.floor(centerRay * W / NUM_RAYS);
        if(Math.abs(midScreen - cScreen) < vW * 1.5){
          // Check vertical — is crosshair in this row?
          const screenMidY = H/2;
          if(screenMidY >= vTop && screenMidY <= vTop+vH+r.sliceH*0.022){
            closestD   = r.corrDist;
            closestHit = movie;
          }
        }
      }
    }

    // Gap between boxes (spine separator)
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(r.minX, r.sliceTop, 1, r.sliceH);
  }

  if(closestHit) lookedAtMovie = closestHit;

  // ── Ceiling light fixtures ──
  ctx.fillStyle='rgba(255,252,230,0.95)';
  for(let lx=W*0.1;lx<W*1.05;lx+=W*0.3) ctx.fillRect(lx-W*0.06,0,W*0.12,4);

  // ── Genre sign strip at top of shelves ──
  // Draw colored genre banners on the shelf tops in world space via HUD overlay
}

// ═══ MINIMAP ═══════════════════════════════════════════════════
function drawMinimap(){
  const ms=5, mw=MAP_W*ms, mh=MAP_H*ms, ox=W-mw-10, oy=H-mh-10;
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(ox-1,oy-1,mw+2,mh+2);
  for(let my=0;my<MAP_H;my++) for(let mx=0;mx<MAP_W;mx++){
    const c=MAP[my][mx];
    ctx.fillStyle=c===0?'#0e2244':c===1?'#b89000':c===2||c===3?'#7a5c1e':c===4?'#3a1a08':'#1a1050';
    ctx.fillRect(ox+mx*ms,oy+my*ms,ms-1,ms-1);
  }
  ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(ox+px*ms,oy+py*ms,3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(ox+px*ms,oy+py*ms); ctx.lineTo(ox+px*ms+Math.cos(pAngle)*8,oy+py*ms+Math.sin(pAngle)*8); ctx.stroke();
}

// ═══ MOVIE CARD ════════════════════════════════════════════════
const movieCard=document.getElementById('movie-card');
let lastMovie=null;
function updateMovieCard(){
  if(lookedAtMovie && lookedAtMovie!==lastMovie){
    lastMovie=lookedAtMovie;
    document.getElementById('mc-title').textContent=lookedAtMovie.title;
    document.getElementById('mc-meta').textContent=lookedAtMovie.year;
    document.getElementById('mc-genre').textContent=lookedAtMovie.genre;
    document.getElementById('mc-rating').textContent='★ '+lookedAtMovie.rating;
    document.getElementById('mc-desc').textContent=lookedAtMovie.desc;
    const ph=document.getElementById('mc-ph'), pi=document.getElementById('mc-poster');
    if(lookedAtMovie.imgLg){ pi.src=lookedAtMovie.imgLg; pi.style.display='block'; ph.style.display='none'; }
    else { pi.style.display='none'; ph.style.display='flex'; ph.textContent='🎬'; }
    movieCard.classList.add('show');
    if(isMobile) document.getElementById('e-btn').style.display='flex';
  } else if(!lookedAtMovie){
    lastMovie=null; movieCard.classList.remove('show');
    if(isMobile) document.getElementById('e-btn').style.display='none';
  }
}

// ═══ AISLE LABEL ═══════════════════════════════════════════════
const aisleEl=document.getElementById('aisle-label');
let lastAisle='', aisleTimer=null;
function updateAisle(){
  const icons=['🎬','💥','😂','👻','🎭','🚀','🏆','⭐'];
  let ai=-1;
  if(py>1&&py<4) ai=-2;
  else if(py>=5&&py<=6)  ai=0;
  else if(py>=8&&py<=9)  ai=1;
  else if(py>=11&&py<=12) ai=2;
  else if(py>=14&&py<=15) ai=3;
  else if(py>=17&&py<=18) ai=4;
  else if(py>=20) ai=7;
  const label=ai===-1?'':ai===-2?'🛒 CHECKOUT':AISLES[ai]?(icons[ai]+' '+AISLES[ai].label):'';
  if(label!==lastAisle){
    lastAisle=label; aisleEl.textContent=label;
    aisleEl.classList.add('show'); clearTimeout(aisleTimer);
    aisleTimer=setTimeout(()=>aisleEl.classList.remove('show'),2200);
  }
}

// ═══ INTERACT ══════════════════════════════════════════════════
function tryInteract(){ if(lookedAtMovie) rentCurrent(); }
function rentCurrent(){
  const m=lookedAtMovie; if(!m)return;
  document.getElementById('toast-title').textContent='🎬 '+m.title;
  document.getElementById('toast-body').textContent='Added to your queue! In the full app, this would open your streaming service.';
  const tp=document.getElementById('toast-poster');
  if(m.imgLg){tp.src=m.imgLg;tp.style.display='block';}else tp.style.display='none';
  document.getElementById('toast').style.display='block';
  if(pointerLocked) document.exitPointerLock();
}
function closeToast(){ document.getElementById('toast').style.display='none'; }

// ═══ INPUT ═════════════════════════════════════════════════════
const keys={};
document.addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true; if(e.key==='e'||e.key==='E')tryInteract(); });
document.addEventListener('keyup',  e=>keys[e.key.toLowerCase()]=false);
let pointerLocked=false;
canvas.addEventListener('click',()=>{ if(!document.getElementById('intro').classList.contains('out'))return; canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange',()=>{ pointerLocked=document.pointerLockElement===canvas; });
document.addEventListener('mousemove',e=>{ if(pointerLocked)pAngle+=e.movementX*0.002; });

const isMobile='ontouchstart' in window;
if(isMobile){
  document.getElementById('joy-zone').style.display='block';
  document.getElementById('look-zone').style.display='block';
  document.getElementById('controls').style.display='none';
}
let joyActive=false,joyX=0,joyY=0;
const joyZone=document.getElementById('joy-zone'),joyDot=document.getElementById('joy-dot');
joyZone.addEventListener('touchstart',e=>{joyActive=true;e.preventDefault();},{passive:false});
joyZone.addEventListener('touchend',()=>{joyActive=false;joyX=0;joyY=0;joyDot.style.transform='translate(-50%,-50%)';});
joyZone.addEventListener('touchmove',e=>{
  if(!joyActive)return;e.preventDefault();
  const t=e.touches[0],r=joyZone.getBoundingClientRect();
  let dx=t.clientX-(r.left+r.width/2),dy=t.clientY-(r.top+r.height*0.65);
  const d=Math.sqrt(dx*dx+dy*dy),mx=32; if(d>mx){dx=dx/d*mx;dy=dy/d*mx;}
  joyX=dx/mx;joyY=dy/mx;
  joyDot.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
},{passive:false});
let lookX=0,lookOn=false;
const lookZone=document.getElementById('look-zone');
lookZone.addEventListener('touchstart',e=>{lookOn=true;lookX=e.touches[0].clientX;e.preventDefault();},{passive:false});
lookZone.addEventListener('touchend',()=>lookOn=false);
lookZone.addEventListener('touchmove',e=>{
  if(!lookOn)return;e.preventDefault();
  pAngle+=(e.touches[0].clientX-lookX)*0.005; lookX=e.touches[0].clientX;
},{passive:false});

// ═══ GAME LOOP ══════════════════════════════════════════════════
let started=false;
function loop(){
  requestAnimationFrame(loop);
  if(!started)return;
  if(keys['w']||keys['arrowup'])    tryMove(Math.cos(pAngle)*SPEED,  Math.sin(pAngle)*SPEED);
  if(keys['s']||keys['arrowdown'])  tryMove(-Math.cos(pAngle)*SPEED,-Math.sin(pAngle)*SPEED);
  if(keys['a']||keys['arrowleft'])  pAngle-=0.032;
  if(keys['d']||keys['arrowright']) pAngle+=0.032;
  if(joyActive){ tryMove(Math.cos(pAngle)*(-joyY)*SPEED*1.3,Math.sin(pAngle)*(-joyY)*SPEED*1.3); pAngle+=joyX*0.04; }
  castAndRender();
  drawMinimap();
  updateMovieCard();
  updateAisle();
}
requestAnimationFrame(loop);

function enterStore(){
  document.getElementById('intro').classList.add('out');
  setTimeout(()=>{ document.getElementById('intro').style.display='none'; started=true; },700);
  if(!isMobile) canvas.requestPointerLock();
}
window.addEventListener('resize',()=>{ W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H; });

// ═══ INIT ════════════════════════════════════════════════════
async function init(){
  const bar=document.getElementById('loading-bar'), status=document.getElementById('loading-status');
  for(let i=0;i<AISLES.length;i++){
    status.textContent=`Loading ${AISLES[i].label}...`;
    await fetchAisle(AISLES[i],i);
    bar.style.width=`${Math.round((i+1)/AISLES.length*100)}%`;
  }
  status.textContent='Ready!';
  await new Promise(r=>setTimeout(r,350));
  document.getElementById('loading').classList.add('out');
  setTimeout(()=>{ document.getElementById('loading').style.display='none'; document.getElementById('intro').style.display='flex'; },600);
}
init();
</script>
